<!-- ============================================================
     F031 — Cookie Notice
     Compact bottom bar, localStorage persistence, slide-up
     ============================================================ -->

<div class="cookie-notice"
     id="cookie-notice"
     role="dialog"
     aria-label="Cookie consent"
     aria-describedby="cookie-notice-text"
     aria-hidden="true">
  <div class="cookie-notice__inner">
    <p class="cookie-notice__text" id="cookie-notice-text">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16"
           aria-hidden="true" style="flex-shrink:0;">
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"
              stroke="#0B3D2E" stroke-width="1.5"/>
        <path d="M12 8v4M12 16h.01" stroke="#0B3D2E" stroke-width="1.75"
              stroke-linecap="round"/>
      </svg>
      This site uses cookies to improve your experience.
      <a href="/privacy" class="cookie-notice__link">Learn more</a>
    </p>
    <button class="cookie-notice__accept btn btn-primary btn-sm"
            id="cookie-accept"
            aria-label="Accept cookies and close notice">
      Accept
    </button>
    <button class="cookie-notice__dismiss"
            id="cookie-dismiss"
            aria-label="Dismiss cookie notice">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
        <line x1="6" y1="6" x2="18" y2="18" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<style>
.cookie-notice {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 950;
  background: white;
  border-top: 1px solid #E5E0D8;
  box-shadow: 0 -4px 24px rgba(11, 61, 46, 0.08);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}

.cookie-notice.visible {
  transform: translateY(0);
}

.cookie-notice__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0.875rem clamp(1.25rem, 5vw, 5rem);
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.cookie-notice__text {
  flex: 1;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  color: #374151;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  min-width: 200px;
}

.cookie-notice__link {
  color: #0B3D2E;
  text-decoration: underline;
  font-weight: 500;
  transition: color 0.2s ease;
}

.cookie-notice__link:hover {
  color: #C8973A;
}

.cookie-notice__accept {
  white-space: nowrap;
  flex-shrink: 0;
}

.cookie-notice__dismiss {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.2s ease;
  flex-shrink: 0;
  padding: 0;
}

.cookie-notice__dismiss:hover {
  background: #F5F0E8;
}

@media (max-width: 640px) {
  .cookie-notice__inner {
    padding: 0.75rem 1.25rem;
    gap: 0.75rem;
  }
}
</style>

<script>
(function() {
  var notice   = document.getElementById('cookie-notice');
  var acceptBtn = document.getElementById('cookie-accept');
  var dismissBtn = document.getElementById('cookie-dismiss');

  if (!notice) return;

  // Check if already accepted
  if (localStorage.getItem('cookiesAccepted') === '1') return;

  // Show after a short delay
  setTimeout(function() {
    notice.classList.add('visible');
    notice.setAttribute('aria-hidden', 'false');
  }, 1500);

  function hide() {
    notice.classList.remove('visible');
    notice.setAttribute('aria-hidden', 'true');
  }

  if (acceptBtn) {
    acceptBtn.addEventListener('click', function() {
      localStorage.setItem('cookiesAccepted', '1');
      hide();
    });
  }

  if (dismissBtn) {
    dismissBtn.addEventListener('click', function() {
      hide();
    });
  }
})();
</script>
