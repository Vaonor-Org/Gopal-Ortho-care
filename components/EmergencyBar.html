<!-- ============================================================
     F002 — Emergency Top Bar
     40px height, dark green (#0B3D2E), full-width
     ============================================================ -->

<div class="emergency-bar" id="emergency-bar" role="banner" aria-label="Emergency information">
  <div class="emergency-bar__inner">

    <!-- Left: Alert icon + text -->
    <div class="emergency-bar__left">
      <svg class="emergency-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true" width="16" height="16">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
              stroke="#E53E3E" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="9" x2="12" y2="13"
              stroke="#E53E3E" stroke-width="1.75" stroke-linecap="round"/>
        <circle cx="12" cy="17" r="0.75" fill="#E53E3E" stroke="#E53E3E" stroke-width="0.5"/>
      </svg>
      <span class="emergency-bar__text">
        24/7 Emergency Orthopaedic Care — Call
        <a href="tel:+919597040918" class="emergency-bar__phone" aria-label="Call 095970 40918">
          095970 40918
        </a>
      </span>
    </div>

    <!-- Right: Call Now pill + Dismiss -->
    <div class="emergency-bar__right">
      <a href="tel:+919597040918"
         class="emergency-bar__cta"
         aria-label="Call Gopal Ortho now">
        Call Now
      </a>
      <button class="emergency-bar__dismiss"
              id="emergency-dismiss"
              aria-label="Dismiss emergency bar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
             width="14" height="14" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"
                stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
          <line x1="6" y1="6" x2="18" y2="18"
                stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<style>
/* Emergency Bar Styles */
.emergency-bar {
  width: 100%;
  height: 40px;
  background: #0B3D2E;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 1000;
  overflow: hidden;
  will-change: transform, opacity;
}

@media (prefers-reduced-motion: no-preference) {
  .emergency-bar {
    animation: slideDown 0.4s ease-out forwards;
    animation-delay: 0ms;
  }
}

.emergency-bar.dismissed {
  display: none;
}

.emergency-bar__inner {
  max-width: 1320px;
  width: 100%;
  margin: 0 auto;
  padding: 0 clamp(1.25rem, 5vw, 5rem);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.emergency-bar__left {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
  min-width: 0;
}

.emergency-bar__icon {
  flex-shrink: 0;
}

.emergency-bar__text {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.emergency-bar__phone {
  color: rgba(255, 255, 255, 0.92);
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  transition: border-color 0.2s ease;
}

.emergency-bar__phone:hover {
  border-color: rgba(255, 255, 255, 0.8);
}

.emergency-bar__right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}

.emergency-bar__cta {
  display: inline-flex;
  align-items: center;
  height: 26px;
  padding: 0 0.875rem;
  border-radius: 9999px;
  border: 1px solid #C8973A;
  color: #C8973A;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-decoration: none;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}

.emergency-bar__cta:hover {
  background: #C8973A;
  color: white;
}

.emergency-bar__dismiss {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: background 0.2s ease;
  padding: 0;
}

.emergency-bar__dismiss:hover {
  background: rgba(255, 255, 255, 0.1);
}

@media (max-width: 640px) {
  .emergency-bar__text {
    font-size: 0.6875rem;
  }
  .emergency-bar__cta {
    display: none;
  }
}
</style>

<script>
(function() {
  var bar = document.getElementById('emergency-bar');
  var btn = document.getElementById('emergency-dismiss');

  // Check if already dismissed this session
  if (sessionStorage.getItem('emergencyBarDismissed') === '1') {
    if (bar) bar.style.display = 'none';
    return;
  }

  if (btn && bar) {
    btn.addEventListener('click', function() {
      bar.style.transition = 'height 0.3s ease, opacity 0.3s ease';
      bar.style.opacity = '0';
      bar.style.height = '0';
      bar.style.overflow = 'hidden';
      sessionStorage.setItem('emergencyBarDismissed', '1');
      setTimeout(function() {
        bar.style.display = 'none';
      }, 300);
    });
  }
})();
</script>
