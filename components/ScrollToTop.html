<!-- ============================================================
     F018 — Scroll-to-top Button
     Fixed bottom-right, appears at 400px scroll, hover gold
     ============================================================ -->

<button class="scroll-top"
        id="scroll-top-btn"
        aria-label="Scroll to top of page"
        hidden>
  <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
    <polyline points="18 15 12 9 6 15"
              stroke="white" stroke-width="2.25"
              stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<style>
.scroll-top {
  position: fixed;
  bottom: 88px; /* offset above WhatsApp button */
  right: 24px;
  z-index: 900;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #0B3D2E;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(11, 61, 46, 0.2);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, background 0.25s ease, transform 0.25s ease;
  will-change: opacity, transform;
}

.scroll-top.visible {
  opacity: 1;
  pointer-events: all;
}

.scroll-top:hover {
  background: #C8973A;
  transform: translateY(-2px);
}

@media (max-width: 640px) {
  .scroll-top {
    bottom: 80px;
    right: 16px;
    width: 40px;
    height: 40px;
  }
}
</style>

<script>
(function() {
  var btn = document.getElementById('scroll-top-btn');
  if (!btn) return;

  btn.hidden = false;

  window.addEventListener('scroll', function() {
    if (window.scrollY > 400) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  }, { passive: true });

  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
