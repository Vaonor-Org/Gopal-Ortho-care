<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Management – Gopal Ortho Care</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --primary:#0A6EBD;--primary-dark:#064A80;--primary-darker:#062A45;
      --primary-ul:#E6F1FE;--gold:#C8973A;--gold-light:#E8C776;
      --bg:#F0F7FF;--bg-dark:#062A45;--bg-darker:#041C30;
      --surface:#ffffff;--surface-card:#F8FBFF;
      --border:#D6E6F5;--border-med:#B0CCE8;
      --text-dark:#1A1A1A;--text-med:#4A4A4A;--text-light:#8A8A8A;
      --success:#2D7A4F;--success-bg:#EDF7F2;
      --error:#B94040;--error-bg:#FEF2F2;--warning:#D97706;
      --sidebar-w:260px;
    }
    html{font-size:16px;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex;overflow-x:hidden;}
    [data-lang="ta"] body,[data-lang="ta"] input,[data-lang="ta"] select,[data-lang="ta"] textarea,[data-lang="ta"] button{font-family:'Noto Sans Tamil','DM Sans',sans-serif;}

    /* ── SIDEBAR ── */
    #sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--bg-darker);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1);}
    body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
    body.sidebar-collapsed #main { margin-left: 0; }
    @media (max-width: 960px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0 !important; }
      body.sidebar-collapsed #sidebar { transform: translateX(0); }
    }

    #sidebar-toggle-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      transition: all 0.2s;
    }
    #sidebar-toggle-btn:hover {
      border-color: var(--primary);
      background: var(--primary-ul);
      color: var(--primary);
    }

    .filter-btn {
      height: 38px;
      padding: 0 1rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 500;
      color: var(--text-med);
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-ul);
    }
    .sidebar__brand{padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid rgba(255,255,255,.06);}
    .sidebar__logo{display:flex;align-items:center;gap:.625rem;text-decoration:none;}
    .sidebar__logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(10,110,189,.35);}
    .sidebar__logo-text .gopal{display:block;font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:#fff;line-height:1;}
    .sidebar__logo-text .ortho{display:block;font-size:.6rem;color:rgba(255,255,255,.4);letter-spacing:.18em;text-transform:uppercase;}
    .sidebar__badge{margin:.5rem 1.25rem;padding:.2rem .625rem;background:rgba(200,151,58,.15);border:1px solid rgba(200,151,58,.3);border-radius:5px;font-size:.625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light);display:inline-block;}
    .sidebar__nav{flex:1;padding:.875rem .75rem;display:flex;flex-direction:column;gap:.2rem;}
    .nav-item{display:flex;align-items:center;gap:.625rem;padding:.65rem .875rem;border-radius:9px;font-size:.875rem;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid transparent;background:none;width:100%;text-align:left;}
    .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
    .nav-item.active{background:rgba(10,110,189,.2);color:#fff;border-color:rgba(10,110,189,.35);}
    .nav-item svg{width:16px;height:16px;stroke:rgba(255,255,255,.4);fill:none;flex-shrink:0;transition:stroke .2s;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.7;}
    .nav-item.active svg{stroke:#5EB1F0;}
    .nav-item:hover svg{stroke:rgba(255,255,255,.8);}
    .nav-divider{height:1px;background:rgba(255,255,255,.06);margin:.375rem 0;}
    .sidebar__footer{padding:.875rem .75rem 1rem;border-top:1px solid rgba(255,255,255,.06);}
    .user-pill{display:flex;align-items:center;gap:.5rem;padding:.625rem;background:rgba(255,255,255,.05);border-radius:9px;margin-bottom:.625rem;}
    .user-pill__avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;}
    .user-pill__name{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.75);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-logout{width:100%;height:36px;background:rgba(185,64,64,.12);border:1px solid rgba(185,64,64,.25);border-radius:7px;color:rgba(255,100,100,.85);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;}
    .btn-logout:hover{background:rgba(185,64,64,.22);color:#ff8080;}

    /* ── MAIN ── */
    #main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .3s cubic-bezier(.4,0,.2,1);}

    /* ── TOPBAR ── */
    .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;gap:1rem;}
    .topbar__left{display:flex;align-items:center;gap:.75rem;}
    .topbar__title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--text-dark);}
    .topbar__right{display:flex;align-items:center;gap:.75rem;}

    /* Language toggle */
    .lang-toggle{display:flex;align-items:center;background:var(--surface-card);border:1.5px solid var(--border);border-radius:9999px;padding:3px;gap:2px;}
    .lang-btn{height:28px;padding:0 .75rem;border-radius:9999px;border:none;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-light);letter-spacing:.02em;}
    .lang-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(10,110,189,.3);}

    /* Add button */
    .btn-add{height:38px;padding:0 1.1rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .25s;box-shadow:0 4px 14px rgba(10,110,189,.3);white-space:nowrap;}
    .btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,110,189,.4);}

    /* ── SECTION PAGES ── */
    .section-page{flex:1;padding:1.5rem;}

    /* ── ROOMS ── */
    .rooms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem;}
    .rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.1rem;}
    .room-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s;}
    .room-card.occupied{border-color:rgba(10,110,189,.4);}
    .room-card__header{padding:.875rem 1.1rem;display:flex;align-items:center;justify-content:space-between;}
    .room-card__name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--text-dark);}
    .room-status{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .625rem;border-radius:9999px;font-size:.625rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
    .room-status.available{background:rgba(45,122,79,.1);color:var(--success);}
    .room-status.occupied{background:rgba(10,110,189,.12);color:var(--primary);}
    .room-card__body{padding:0 1.1rem 1.1rem;}
    .room-patient-name{font-weight:600;color:var(--text-dark);margin-bottom:.2rem;}
    .room-since{font-size:.75rem;color:var(--text-light);font-family:'DM Mono',monospace;}
    .room-card__footer{border-top:1px solid var(--border);padding:.75rem 1.1rem;display:flex;gap:.5rem;}
    .btn-room-action{flex:1;height:34px;border-radius:8px;border:none;font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;}
    .btn-checkin{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 3px 10px rgba(10,110,189,.3);}
    .btn-checkin:hover{transform:translateY(-1px);}
    .btn-checkout{background:rgba(185,64,64,.1);border:1px solid rgba(185,64,64,.25);color:var(--error);}
    .btn-checkout:hover{background:rgba(185,64,64,.2);}
    .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text-light);}
    .icon-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ul);}
    .icon-btn.delete:hover{border-color:var(--error);color:var(--error);background:var(--error-bg);}
    .icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;}

    /* ── FORM ELEMENTS ── */
    .f-group{display:flex;flex-direction:column;gap:.3rem;}
    .f-label{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-med);}
    .f-label span{color:var(--error);}
    .f-input,.f-select{height:40px;padding:0 .75rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.875rem;color:var(--text-dark);background:var(--surface-card);outline:none;transition:all .2s;width:100%;}
    .f-input:focus,.f-select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(10,110,189,.1);}
    .f-select{cursor:pointer;padding-right:2rem;}

    .btn-cancel{height:38px;padding:0 1.1rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:inherit;font-size:.875rem;font-weight:500;color:var(--text-med);cursor:pointer;transition:all .2s;}
    .btn-cancel:hover{border-color:var(--text-med);color:var(--text-dark);}
    .btn-save{height:38px;padding:0 1.375rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .25s;box-shadow:0 4px 14px rgba(10,110,189,.3);}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,110,189,.4);}

    /* ── MODALS ── */
    .center-modal-overlay{position:fixed;inset:0;background:rgba(4,28,48,.65);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1.5rem;}
    .center-modal-overlay.show{display:flex;}
    .center-modal{background:var(--surface);border-radius:16px;width:min(440px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(4,28,48,.3);}
    .center-modal__header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .center-modal__title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;}
    .center-modal__body{padding:1.5rem;display:flex;flex-direction:column;gap:.875rem;}
    .center-modal__footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;}
    .modal-close{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:all .2s;}
    .modal-close:hover{border-color:var(--error);color:var(--error);}
    .modal-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:2;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;background:var(--bg-darker);color:#fff;padding:.75rem 1.1rem;border-radius:11px;font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 32px rgba(4,28,48,.35);transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{border-left:4px solid #2D7A4F;}
    .toast.error{border-left:4px solid var(--error);}
    .toast svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0;}

    /* ── DARK MODE OVERRIDES ── */
    html[data-theme="dark"] {
      --bg: #07121e;
      --bg-dark: #091a2b;
      --bg-darker: #040d16;
      --surface: #0e1e30;
      --surface-card: #13273c;
      --border: #1e3753;
      --border-med: #2b4e75;
      --text-dark: #f0f6fc;
      --text-med: #c9d1d9;
      --text-light: #8b949e;
      --success: #3fb950;
      --success-bg: rgba(63,185,80,0.1);
      --error: #f85149;
      --error-bg: rgba(248,81,73,0.1);
      --warning: #f0883e;
      --primary-ul: rgba(10,110,189,0.25);
    }
    html[data-theme="dark"] body {
      color: var(--text-dark);
      background: var(--bg);
    }
    html[data-theme="dark"] .lang-btn:not(.active) {
      color: var(--text-light);
    }
    html[data-theme="dark"] .lang-toggle {
      background: var(--surface-card);
      border-color: var(--border);
    }
    html[data-theme="dark"] .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    html[data-theme="dark"] .icon-btn {
      background: var(--surface);
    }
    html[data-theme="dark"] .icon-btn:hover {
      background: var(--primary-ul);
    }
    html[data-theme="dark"] .icon-btn.delete:hover {
      background: var(--error-bg);
    }
    html[data-theme="dark"] select,
    html[data-theme="dark"] input {
      background: var(--surface);
      color: var(--text-dark);
      border-color: var(--border);
    }
    html[data-theme="dark"] select:focus,
    html[data-theme="dark"] input:focus {
      background: var(--surface-card);
    }
    html[data-theme="dark"] .room-card {
      background: var(--surface);
      border-color: var(--border);
    }
    html[data-theme="dark"] .center-modal {
      background: var(--surface);
      color: var(--text-dark);
    }
    html[data-theme="dark"] .modal-close {
      border-color: var(--border);
      color: var(--text-light);
    }
    html[data-theme="dark"] .modal-close:hover {
      color: var(--text-dark);
      background: var(--surface-card);
    }
  </style>
</head>
<body>

<script>
  // Init theme immediately to prevent flashing
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>

  <div class="sidebar__footer">

<!-- ═══════════════ MAIN ═══════════════ -->
<div id="main">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar__left">
      <button id="sidebar-toggle-btn" onclick="window.toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="1.8" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <h1 class="topbar__title" id="topbar-title" data-i18n="rooms">Room Management</h1>
    </div>
    <div class="topbar__right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="lang-ta" onclick="setLang('ta')">தமிழ்</button>
      </div>

      <button id="theme-toggle-btn" onclick="window.toggleTheme()" style="width:34px;height:34px;border-radius:9999px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-med);transition:all .2s;flex-shrink:0;" title="Toggle Dark/Light Mode">

        <svg id="theme-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

  <!-- ─── ROOMS SECTION ─── -->

          Room Log
        </button>
        <button class="btn-add" onclick="openAddRoomModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>

          <input class="f-input" id="checkin-patient-search" type="text" placeholder="Search by name or ID…" style="padding-left:2.1rem;padding-right:.75rem;" oninput="filterCheckinPatients(this.value)" autocomplete="off">

<div class="center-modal-overlay" id="log-overlay" style="z-index:1050;padding:1.5rem;align-items:flex-start;padding-top:3rem;">

        </div>
        <div>
          <div id="log-modal-title" style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:#fff;">Room Log</div>
          <div id="log-modal-sub" style="font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.1rem;">All check-in / check-out history</div>

        <option value="all">All Rooms</option>
      </select>
      <select id="log-status-filter" onchange="applyLogFilter()" style="height:34px;padding:0 2rem 0 .75rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.8rem;color:var(--text-dark);background:var(--surface-card);outline:none;cursor:pointer;">
        <option value="all">All Status</option>
        <option value="active">Currently In</option>
        <option value="done">Checked Out</option>
      </select>
      <span id="log-count" style="font-size:.775rem;color:var(--text-light);margin-left:auto;"></span>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <svg id="toast-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"></svg>
  <span id="toast-msg"></span>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, onSnapshot, query, orderBy, serverTimestamp, getDocs, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC6u7Bm1qosC7IDx5Qk7mD-QlRTDV3o1RA",
  authDomain:"gopal-fd3d8.firebaseapp.com",
  projectId:"gopal-fd3d8",
  storageBucket:"gopal-fd3d8.firebasestorage.app",
  messagingSenderId:"114488164961",
  appId:"1:114488164961:web:ad3a60422ff71545032020"
};
const app    = initializeApp(firebaseConfig);
const authFB = getAuth(app);
const db     = getFirestore(app);

// Auth Check + Session Timeout
const ADMIN_EMAILS = ['gopalorthocare@gmail.com','whitedevil874@gmail.com'];
const SESSION_MS = 24 * 60 * 60 * 1000;
let _activityTimer = null;
const resetActivityTimer = () => {
  if (_activityTimer) clearTimeout(_activityTimer);
  localStorage.setItem('lastActivity', Date.now());
  _activityTimer = setTimeout(async () => { await signOut(authFB); window.location.href='login.html?reason=timeout'; }, SESSION_MS);
};
document.addEventListener('mousemove', resetActivityTimer, { passive: true });
document.addEventListener('keydown', resetActivityTimer, { passive: true });
document.addEventListener('click', resetActivityTimer, { passive: true });

onAuthStateChanged(authFB, async user => {
  if (!user) { window.location.href='login.html'; return; }
  if (!ADMIN_EMAILS.includes((user.email||'').toLowerCase())) { await signOut(authFB); window.location.href='login.html?reason=denied'; return; }
  const last = parseInt(localStorage.getItem('lastActivity')||'0');
  if (last && Date.now()-last > SESSION_MS) { await signOut(authFB); window.location.href='login.html?reason=timeout'; return; }
  resetActivityTimer();
  const displayName = user.displayName || (user.email||'DR').split('@')[0];
  const savedName = localStorage.getItem('displayName') || displayName;
  const av = document.getElementById('user-avatar');
  const nd = document.getElementById('user-name-display');
  if (av) av.textContent = savedName.slice(0,2).toUpperCase();
  if (nd) nd.textContent = savedName;
});

// State variables
let allRooms = [];
let allPatients = [];
let allLoadedLogs = [];
let checkinRoomId = null;

// Billing defaults (loaded from localStorage)
let billingDefaults = {
  consultFee: 250,
  dressingFee: 100,
  xrayFee: 200,
  roomRateIns: 2000,
  roomRateNoIns: 1500
};
const loadBillingDefaults = () => {
  try {
    const saved = JSON.parse(localStorage.getItem('billingDefaults') || '{}');
    billingDefaults = { ...billingDefaults, ...saved };
  } catch(e) {}
};
loadBillingDefaults();

// i18n Dictionary
const i18n={
  en:{
    patients:'Patient Records',rooms:'Room Management',bills:'Billing',
    normal:'Normal',urgent:'Urgent',signOut:'Sign Out',
    checkIn:'Check In',checkOut:'Check Out',occupied:'Occupied',available:'Available',
    patient:'Patient',since:'Since',empty:'Empty',addRoom:'Add Room',
    roomsSubtitle:'Track patient room occupancy',
    noticeboard: 'Notice Board', settings: 'Settings',
    roomLog: 'Room Log',
    searchPatientsPlaceholder: 'Search patients…'
  },
  ta:{
    patients:'நோயாளர் பதிவுகள்',rooms:'அறை மேலாண்மை',bills:'கட்டண மசோதா',
    normal:'சாதாரண',urgent:'அவசரம்',signOut:'வெளியேறு',
    checkIn:'சேர்க்கை',checkOut:'வெளியேறு',occupied:'நிரம்பியது',available:'கிடைக்கிறது',
    patient:'நோயாளர்',since:'தொடங்கி',empty:'காலி',addRoom:'அறை சேர்க்க',
    roomsSubtitle:'நோயாளர் அறை நிலையை கண்காணிக்கவும்',
    noticeboard: 'அறிவிப்பு பலகை', settings: 'அமைப்புகள்',
    roomLog: 'அறை பதிவு',
    searchPatientsPlaceholder: 'நோயாளர்களைத் தேடுக…'
  }
};

let currentLang=localStorage.getItem('lang') || 'en';
window.setLang = lang => {
  currentLang=lang;
  localStorage.setItem('lang', lang);
  document.documentElement.setAttribute('data-lang',lang);
  document.getElementById('lang-en').classList.toggle('active',lang==='en');
  document.getElementById('lang-ta').classList.toggle('active',lang==='ta');
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(i18n[lang][key]) el.textContent=i18n[lang][key];
  });
  const cps=document.getElementById('checkin-patient-search');
  if(cps) cps.placeholder = lang === 'ta' ? 'பெயர் அல்லது ஐடி மூலம் தேடவும்…' : 'Search by name or ID…';
};

const t=key=>i18n[currentLang][key]||i18n.en[key]||key;

// Theme manager
window.toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcons();
};

const updateThemeIcons = () => {
  const theme = document.documentElement.getAttribute('data-theme') || 'light';
  const sun = document.getElementById('theme-sun');
  const moon = document.getElementById('theme-moon');
  if(sun && moon) {
    sun.style.display = theme === 'dark' ? 'block' : 'none';
    moon.style.display = theme === 'dark' ? 'none' : 'block';
  }
};

// Sidebar Toggle
window.toggleSidebar = () => {
  if (window.innerWidth > 960) {
    document.body.classList.toggle('sidebar-collapsed');
  } else {
    document.getElementById('sidebar').classList.toggle('open');
  }
};

// Toast utility
window.showToast=(msg,type='success')=>{
  const toast=document.getElementById('toast');
  const icon=document.getElementById('toast-icon');
  const msgEl=document.getElementById('toast-msg');
  if(!toast)return;
  toast.className=`toast show ${type}`;
  msgEl.textContent=msg;
  if(type==='success'){
    icon.innerHTML='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
  }else{
    icon.innerHTML='<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  }
  setTimeout(()=>{toast.classList.remove('show');},3500);
};

const esc=str=>String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtTs=ts=>{if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true});};

// Rooms Firebase listener
onSnapshot(query(collection(db,'rooms'),orderBy('createdAt','asc')),snap=>{
  allRooms=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderRooms();
});

// Patients Firebase listener
onSnapshot(query(collection(db,'patients'),orderBy('createdAt','desc')),snap=>{
  allPatients=snap.docs.map(d=>({id:d.id,...d.data()}));
});

// Render rooms grid
const renderRooms = () => {
  const grid = document.getElementById('rooms-grid');
  if(!grid) return;
  if (!allRooms.length) {
    grid.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-light);grid-column:1/-1;">No rooms available.</div>';
    return;
  }
  grid.innerHTML = allRooms.map((r, index) => {
    const isOcc = r.occupied;
    const since = r.checkInTime ? fmtTs(r.checkInTime) : '';
    const statusTxt = isOcc ? t('occupied') : t('available');
    const badgeClass = isOcc ? 'occupied' : 'available';
    
    let btnHtml = '';
    if (isOcc) {
      btnHtml = `<button class="btn-room-action btn-checkout" onclick="doCheckout('${r.id}')">${t('checkOut')}</button>`;
    } else {
      btnHtml = `<button class="btn-room-action btn-checkin" onclick="openCheckin('${r.id}','${esc(r.name)}')">${t('checkIn')}</button>`;
    }
    
    const deleteBtn = index >= 4 ? `
      <button class="icon-btn delete" title="Delete room" onclick="deleteRoom('${r.id}')" style="flex-shrink:0;width:34px;height:34px;">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>` : '';

    return `
      <div class="room-card ${isOcc?'occupied':''}">
        <div class="room-card__header">
          <span class="room-card__name" style="display:inline-flex;align-items:center;gap:.4rem;">
            ${esc(r.name)}
            <button class="icon-btn" title="Rename room" onclick="editRoomName('${r.id}', '${esc(r.name)}')" style="width:22px;height:22px;border:none;background:transparent;padding:0;cursor:pointer;color:var(--text-light);display:flex;align-items:center;justify-content:center;">
              <svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </span>
          <span class="room-status ${badgeClass}">${statusTxt}</span>
        </div>
        <div class="room-card__body">
          <p style="font-size:.7rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem;">${esc(r.type || 'General Ward')}</p>
          ${isOcc ? `
            <div class="room-patient-name">${esc(r.patientName)}</div>
            <div class="room-since">${t('since')}: ${since}</div>
            ${r.notes ? `<div style="font-size:.75rem;color:var(--text-med);margin-top:.5rem;padding:.375rem .5rem;background:var(--surface-card);border-radius:6px;border:1px solid var(--border);">${esc(r.notes)}</div>` : ''}
          ` : `
            <div style="color:var(--text-light);font-style:italic;font-size:.85rem;">${t('empty')}</div>
          `}
        </div>
        <div class="room-card__footer">
          ${btnHtml}
          <button class="icon-btn" title="View log history" onclick="viewRoomLog('${r.id}','${esc(r.name)}')" style="flex-shrink:0;width:34px;height:34px;">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
};

window.editRoomName = async (roomId, currentName) => {
  const newName = prompt("Enter new room name:", currentName);
  if (newName === null) return;
  const name = newName.trim();
  if (!name) { showToast('Room name cannot be empty.', 'error'); return; }
  try {
    await updateDoc(doc(db, 'rooms', roomId), { name });
    showToast('Room name updated.');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
};

// Check-in Patient search
window.filterCheckinPatients = (q) => {
  const dropdown = document.getElementById('checkin-patient-dropdown');
  const hiddenInput = document.getElementById('checkin-patient');
  if (!q || q.length < 1) { dropdown.style.display='none'; hiddenInput.value=''; return; }
  const matches = allPatients.filter(p =>
    (p.name||'').toLowerCase().includes(q.toLowerCase()) ||
    (p.patientCode||'').toLowerCase().includes(q.toLowerCase()) ||
    (p.phone||'').includes(q)
  ).slice(0, 10);
  if (!matches.length) { dropdown.style.display='none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = matches.map(p => `
    <div onclick="selectCheckinPatient('${p.id}','${esc(p.name)}', ${p.hasInsurance === true})" style="padding:.625rem 1rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .15s;" onmouseenter="this.style.background='var(--primary-ul)'" onmouseleave="this.style.background='transparent'">
      <div style="font-weight:600;">${esc(p.name)} <span style="font-family:monospace;font-size:.7rem;color:var(--primary);">${p.patientCode||''}</span></div>
      <div style="font-size:.75rem;color:var(--text-light);">${p.age||'?'}y · ${p.gender||''} · ${esc(p.phone||'')}</div>
    </div>`).join('');
};

window.selectCheckinPatient = (id, name, hasIns) => {
  document.getElementById('checkin-patient').value = id;
  document.getElementById('checkin-patient-search').value = name;
  document.getElementById('checkin-patient-dropdown').style.display = 'none';
  document.getElementById('checkin-insurance').value = hasIns ? 'yes' : 'no';
};

// Close dropdown on outside click
document.addEventListener('click', e => {
  const cdd = document.getElementById('checkin-patient-dropdown');
  const cinp = document.getElementById('checkin-patient-search');
  if (cdd && cinp && !cdd.contains(e.target) && e.target !== cinp) cdd.style.display = 'none';
});

window.openCheckin=(roomId,roomName)=>{
  checkinRoomId=roomId;
  document.getElementById('checkin-title').textContent=`Check In – ${roomName}`;
  document.getElementById('checkin-notes').value='';
  const cps = document.getElementById('checkin-patient-search');
  const cph = document.getElementById('checkin-patient');
  if(cps) cps.value = '';
  if(cph) cph.value = '';
  document.getElementById('checkin-insurance').value = 'no';
  document.getElementById('checkin-modal').classList.add('show');
};
window.closeCheckin=()=>{document.getElementById('checkin-modal').classList.remove('show');checkinRoomId=null;};

window.doCheckin=async()=>{
  const pid=document.getElementById('checkin-patient').value;
  const pname=document.getElementById('checkin-patient-search').value;
  if(!pid){showToast('Search and select a patient.','error');return;}
  const p=allPatients.find(x=>x.id===pid);
  const notes=document.getElementById('checkin-notes').value.trim();
  const room=allRooms.find(r=>r.id===checkinRoomId);
  const isInsured = document.getElementById('checkin-insurance').value === 'yes';

  // Update patient insurance status in Firebase if changed or empty
  if (p && p.hasInsurance !== isInsured) {
    try {
      await updateDoc(doc(db, 'patients', pid), { hasInsurance: isInsured });
      p.hasInsurance = isInsured;
    } catch(e) { console.warn("Patient insurance status update failed:", e); }
  }

  // Create room log entry
  const logRef=await addDoc(collection(db,'roomLogs'),{
    roomId:checkinRoomId,
    roomName:room?.name||'',
    patientId:pid,
    patientName:p?.name||pname,
    patientPhone:p?.phone||'',
    patientAge:p?.age||'',
    patientGender:p?.gender||'',
    doctor:p?.doctor||'',
    hasInsurance:isInsured,
    notes,
    checkInTime:serverTimestamp(),
    checkOutTime:null,
    createdAt:serverTimestamp()
  });
  await updateDoc(doc(db,'rooms',checkinRoomId),{
    occupied:true,patientId:pid,patientName:p?.name||pname,
    patientPhone:p?.phone||'',checkInTime:serverTimestamp(),
    currentLogId:logRef.id,
    hasInsurance:isInsured,
    notes
  });
  showToast('Patient checked in.');closeCheckin();
};

window.doCheckout=async(roomId)=>{
  const room=allRooms.find(r=>r.id===roomId);
  if(room?.currentLogId){
    try{
      await updateDoc(doc(db,'roomLogs',room.currentLogId),{checkOutTime:serverTimestamp()});
    }catch(e){console.warn('RoomLog update failed:',e);}
  }
  await updateDoc(doc(db,'rooms',roomId),{
    occupied:false,patientId:null,patientName:null,
    patientPhone:null,checkInTime:null,currentLogId:null,notes:''
  });
  showToast('Patient checked out.');
};

window.deleteRoom=async(id)=>{
  if(!confirm('Delete this room?'))return;
  await deleteDoc(doc(db,'rooms',id));showToast('Room deleted.');
};

window.openAddRoomModal=()=>document.getElementById('add-room-modal').classList.add('show');

window.addRoom=async()=>{
  const name=document.getElementById('new-room-name').value.trim();
  const type=document.getElementById('new-room-type').value;
  if(!name){showToast('Enter room name.','error');return;}
  await addDoc(collection(db,'rooms'),{name,type,occupied:false,patientId:null,patientName:null,checkInTime:null,currentLogId:null,notes:'',createdAt:serverTimestamp()});
  document.getElementById('add-room-modal').classList.remove('show');
  document.getElementById('new-room-name').value='';
  showToast('Room added.');
};

// ── ROOM LOG HISTORY ──
window.viewAllRoomLogs = async () => {
  document.getElementById('log-overlay').classList.add('show');
  document.getElementById('log-modal-title').textContent = 'Room Log History';
  document.getElementById('log-modal-sub').textContent = 'All check-in / check-out history';
  
  const filterRoom = document.getElementById('log-room-filter');
  filterRoom.innerHTML = '<option value="all">All Rooms</option>';
  allRooms.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.name;
    filterRoom.appendChild(opt);
  });
  filterRoom.value = 'all';
  document.getElementById('log-status-filter').value = 'all';
  
  const logBody = document.getElementById('log-body');
  logBody.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-light);">Loading history…</div>';
  document.getElementById('log-count').textContent = '';
  
  try {
    const snap = await getDocs(query(collection(db, 'roomLogs'), orderBy('createdAt', 'desc'), limit(500)));
    allLoadedLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.applyLogFilter();
  } catch (err) {
    logBody.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--error);">Error: ${err.message}</div>`;
  }
};

window.viewRoomLog = async (roomId, roomName) => {
  document.getElementById('log-overlay').classList.add('show');
  document.getElementById('log-modal-title').textContent = `${roomName} — History`;
  document.getElementById('log-modal-sub').textContent = `Check-in / check-out history for ${roomName}`;
  
  const filterRoom = document.getElementById('log-room-filter');
  filterRoom.innerHTML = '<option value="all">All Rooms</option>';
  allRooms.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.name;
    filterRoom.appendChild(opt);
  });
  filterRoom.value = roomId;
  document.getElementById('log-status-filter').value = 'all';
  
  const logBody = document.getElementById('log-body');
  logBody.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-light);">Loading history…</div>';
  document.getElementById('log-count').textContent = '';
  
  try {
    const snap = await getDocs(query(collection(db, 'roomLogs'), orderBy('createdAt', 'desc'), limit(500)));
    allLoadedLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.applyLogFilter();
  } catch (err) {
    logBody.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--error);">Error: ${err.message}</div>`;
  }
};

window.applyLogFilter = () => {
  const roomId = document.getElementById('log-room-filter').value;
  const status = document.getElementById('log-status-filter').value;
  const logBody = document.getElementById('log-body');
  
  let filtered = [...allLoadedLogs];
  if (roomId !== 'all') {
    filtered = filtered.filter(x => x.roomId === roomId);
  }
  if (status === 'active') {
    filtered = filtered.filter(x => !x.checkOutTime);
  } else if (status === 'done') {
    filtered = filtered.filter(x => x.checkOutTime);
  }
  
  document.getElementById('log-count').textContent = `${filtered.length} logs found`;
  
  if (!filtered.length) {
    logBody.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-light);">No logs matching selected filters.</div>';
    return;
  }
  
  logBody.innerHTML = filtered.map(lg => {
    const cin = lg.checkInTime ? fmtTs(lg.checkInTime) : '—';
    const isActive = !lg.checkOutTime;
    const cout = isActive ? 'Currently Checked In' : fmtTs(lg.checkOutTime);
    let dur = '—';
    if (lg.checkInTime && lg.checkOutTime) {
      const ms = (lg.checkOutTime.toDate ? lg.checkOutTime.toDate() : new Date(lg.checkOutTime)).getTime() - (lg.checkInTime.toDate ? lg.checkInTime.toDate() : new Date(lg.checkInTime)).getTime();
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      dur = h > 0 ? `${h}h ${m}m` : `${m}m`;
    }
    const ini = (lg.patientName || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    return `
      <div style="display:flex;gap:.875rem;margin-bottom:1.1rem;padding-bottom:1.1rem;border-bottom:1px solid var(--border);">
        <div style="width:40px;height:40px;border-radius:10px;background:${isActive ? 'linear-gradient(135deg,var(--primary),var(--primary-dark))' : 'var(--surface-card)'};border:2px solid ${isActive ? 'var(--primary)' : 'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:${isActive ? '#fff' : 'var(--text-med)'};flex-shrink:0;">${ini}</div>
        <div style="flex:1;">
          <div style="font-weight:600;font-size:.9rem;margin-bottom:.375rem;display:flex;align-items:center;gap:.5rem;justify-content:space-between;">
            <div>
              ${esc(lg.patientName || '—')}
              ${isActive ? '<span style="padding:.1rem .5rem;background:rgba(10,110,189,.1);color:var(--primary);border-radius:9999px;font-size:.6rem;font-weight:700;margin-left:.5rem;">IN ROOM</span>' : ''}
            </div>
            <span style="font-size:.75rem;font-weight:500;color:var(--text-light);background:var(--surface-card);padding:.15rem .5rem;border-radius:6px;border:1px solid var(--border);">${esc(lg.roomName || 'Room')}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.375rem;">
            <div style="font-size:.75rem;"><span style="color:var(--text-light);">Check In</span><br><strong style="font-family:monospace;font-size:.7rem;">${cin}</strong></div>
            <div style="font-size:.75rem;"><span style="color:var(--text-light);">Check Out</span><br><strong style="font-family:monospace;font-size:.7rem;color:${isActive ? 'var(--success)' : 'var(--text-dark)'};">${cout}</strong></div>
            ${!isActive ? `<div style="font-size:.75rem;"><span style="color:var(--text-light);">Duration</span><br><strong>${dur}</strong></div>` : ''}
            ${lg.patientPhone ? `<div style="font-size:.75rem;"><span style="color:var(--text-light);">Phone</span><br><strong style="font-family:monospace;font-size:.7rem;">${esc(lg.patientPhone)}</strong></div>` : ''}
          </div>
          ${lg.notes ? `<div style="margin-top:.375rem;font-size:.75rem;color:var(--text-med);padding:.375rem .5rem;background:var(--surface-card);border-radius:6px;border:1px solid var(--border);">${esc(lg.notes)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
};

document.getElementById('log-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('show'); });

// Initial Language load
window.setLang(currentLang);
updateThemeIcons();

</script>
