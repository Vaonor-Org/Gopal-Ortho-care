<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notice Board – Gopal Ortho Care</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --primary:#0A6EBD;--primary-dark:#064A80;--primary-darker:#062A45;
      --primary-ul:#E6F1FE;--gold:#C8973A;--gold-light:#E8C776;
      --bg:#F0F7FF;--bg-dark:#062A45;--bg-darker:#041C30;
      --surface:#ffffff;--surface-card:#F8FBFF;
      --border:#D6E6F5;--border-med:#B0CCE8;
      --text-dark:#1A1A1A;--text-med:#4A4A4A;--text-light:#8A8A8A;
      --success:#2D7A4F;--success-bg:#EDF7F2;
      --error:#B94040;--error-bg:#FEF2F2;--warning:#D97706;
      --sidebar-w:260px;
    }
    html{font-size:16px;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex;overflow-x:hidden;}
    [data-lang="ta"] body,[data-lang="ta"] input,[data-lang="ta"] select,[data-lang="ta"] textarea,[data-lang="ta"] button{font-family:'Noto Sans Tamil','DM Sans',sans-serif;}

    /* ── SIDEBAR ── */
    #sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--bg-darker);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1);}
    body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
    body.sidebar-collapsed #main { margin-left: 0; }
    @media (max-width: 960px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0 !important; }
      body.sidebar-collapsed #sidebar { transform: translateX(0); }
    }

    #sidebar-toggle-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      transition: all 0.2s;
    }
    #sidebar-toggle-btn:hover {
      border-color: var(--primary);
      background: var(--primary-ul);
      color: var(--primary);
    }
    .sidebar__brand{padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid rgba(255,255,255,.06);}
    .sidebar__logo{display:flex;align-items:center;gap:.625rem;text-decoration:none;}
    .sidebar__logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(10,110,189,.35);}
    .sidebar__logo-text .gopal{display:block;font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:#fff;line-height:1;}
    .sidebar__logo-text .ortho{display:block;font-size:.6rem;color:rgba(255,255,255,.4);letter-spacing:.18em;text-transform:uppercase;}
    .sidebar__badge{margin:.5rem 1.25rem;padding:.2rem .625rem;background:rgba(200,151,58,.15);border:1px solid rgba(200,151,58,.3);border-radius:5px;font-size:.625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light);display:inline-block;}
    .sidebar__nav{flex:1;padding:.875rem .75rem;display:flex;flex-direction:column;gap:.2rem;}
    .nav-item{display:flex;align-items:center;gap:.625rem;padding:.65rem .875rem;border-radius:9px;font-size:.875rem;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid transparent;background:none;width:100%;text-align:left;}
    .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
    .nav-item.active{background:rgba(10,110,189,.2);color:#fff;border-color:rgba(10,110,189,.35);}
    .nav-item svg{width:16px;height:16px;stroke:rgba(255,255,255,.4);fill:none;flex-shrink:0;transition:stroke .2s;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.7;}
    .nav-item.active svg{stroke:#5EB1F0;}
    .nav-item:hover svg{stroke:rgba(255,255,255,.8);}
    .nav-divider{height:1px;background:rgba(255,255,255,.06);margin:.375rem 0;}
    .sidebar__footer{padding:.875rem .75rem 1rem;border-top:1px solid rgba(255,255,255,.06);}
    .user-pill{display:flex;align-items:center;gap:.5rem;padding:.625rem;background:rgba(255,255,255,.05);border-radius:9999px;margin-bottom:.625rem;}
    .user-pill__avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;}
    .user-pill__name{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.75);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-logout{width:100%;height:36px;background:rgba(185,64,64,.12);border:1px solid rgba(185,64,64,.25);border-radius:7px;color:rgba(255,100,100,.85);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;}
    .btn-logout:hover{background:rgba(185,64,64,.22);color:#ff8080;}

    /* ── MAIN ── */
    #main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .3s cubic-bezier(.4,0,.2,1);}

    /* ── TOPBAR ── */
    .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;gap:1rem;}
    .topbar__left{display:flex;align-items:center;gap:.75rem;}
    .topbar__title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--text-dark);}
    .topbar__right{display:flex;align-items:center;gap:.75rem;}

    /* Language toggle */
    .lang-toggle{display:flex;align-items:center;background:var(--surface-card);border:1.5px solid var(--border);border-radius:9999px;padding:3px;gap:2px;}
    .lang-btn{height:28px;padding:0 .75rem;border-radius:9999px;border:none;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-light);letter-spacing:.02em;}
    .lang-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(10,110,189,.3);}

    /* Add button */
    .btn-add{height:38px;padding:0 1.1rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .25s;box-shadow:0 4px 14px rgba(10,110,189,.3);white-space:nowrap;}
    .btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,110,189,.4);}

    /* ── SECTION PAGES ── */
    .section-page{flex:1;padding:1.5rem;}

    /* ── FORM ELEMENTS ── */
    .f-group{display:flex;flex-direction:column;gap:.3rem;}
    .f-label{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-med);}
    .f-label span{color:var(--error);}
    .f-select{height:40px;padding:0 2rem 0 .75rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.875rem;color:var(--text-dark);background:var(--surface-card);outline:none;transition:all .2s;width:100%;cursor:pointer;padding-right:2rem;}
    .f-select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(10,110,189,.1);}
    .f-textarea{height:72px;padding:.625rem .75rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.875rem;color:var(--text-dark);background:var(--surface-card);outline:none;transition:all .2s;width:100%;resize:vertical;}
    .f-textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(10,110,189,.1);}

    .btn-cancel{height:38px;padding:0 1.1rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:inherit;font-size:.875rem;font-weight:500;color:var(--text-med);cursor:pointer;transition:all .2s;}
    .btn-cancel:hover{border-color:var(--text-med);color:var(--text-dark);}
    .btn-save{height:38px;padding:0 1.375rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .25s;box-shadow:0 4px 14px rgba(10,110,189,.3);}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,110,189,.4);}

    /* ── MODALS ── */
    .center-modal-overlay{position:fixed;inset:0;background:rgba(4,28,48,.65);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1.5rem;}
    .center-modal-overlay.show{display:flex;}
    .center-modal{background:var(--surface);border-radius:16px;width:min(440px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(4,28,48,.3);}
    .center-modal__header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .center-modal__title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;}
    .center-modal__body{padding:1.5rem;display:flex;flex-direction:column;gap:.875rem;}
    .center-modal__footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;}
    .modal-close{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:all .2s;}
    .modal-close:hover{border-color:var(--error);color:var(--error);}
    .modal-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:2;}

    /* ── DRAG & DROP NOTICE BOARD ── */
    .draggable-task {
      cursor: grab !important;
      user-select: none;
    }
    .draggable-task:active {
      cursor: grabbing !important;
    }
    @keyframes tearLeft {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-100px, 150px) rotate(-25deg); opacity: 0; }
    }
    @keyframes tearRight {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(100px, 150px) rotate(25deg); opacity: 0; }
    }
    .tearing-left {
      animation: tearLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
    }
    .tearing-right {
      animation: tearRight 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
    }

    /* Undo Banner */
    .undo-banner {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #0e1e30;
      border: 1.5px solid var(--border);
      color: var(--text-dark);
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      z-index: 11000;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
      opacity: 0;
      pointer-events: none;
    }
    .undo-banner.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .undo-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.4rem 0.875rem;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.775rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(10, 110, 189, 0.3);
    }
    #notice-dustbin.hovered {
      background: rgba(239, 154, 154, 0.25) !important;
      color: #ef5350 !important;
      transform: scale(1.15);
      box-shadow: 0 8px 24px rgba(239, 83, 80, 0.25);
    }
    #notice-dustbin.hovered svg {
      transform: translateY(-4px) rotate(-10deg);
    }

    /* ── TOAST ── */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;background:var(--bg-darker);color:#fff;padding:.75rem 1.1rem;border-radius:11px;font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 32px rgba(4,28,48,.35);transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{border-left:4px solid #2D7A4F;}
    .toast.error{border-left:4px solid var(--error);}
    .toast svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0;}

    /* ── DARK MODE OVERRIDES ── */
    html[data-theme="dark"] {
      --bg: #07121e;
      --bg-dark: #091a2b;
      --bg-darker: #040d16;
      --surface: #0e1e30;
      --surface-card: #13273c;
      --border: #1e3753;
      --border-med: #2b4e75;
      --text-dark: #f0f6fc;
      --text-med: #c9d1d9;
      --text-light: #8b949e;
      --success: #3fb950;
      --success-bg: rgba(63,185,80,0.1);
      --error: #f85149;
      --error-bg: rgba(248,81,73,0.1);
      --warning: #f0883e;
      --primary-ul: rgba(10,110,189,0.25);
    }
    html[data-theme="dark"] body {
      color: var(--text-dark);
      background: var(--bg);
    }
    html[data-theme="dark"] .lang-btn:not(.active) {
      color: var(--text-light);
    }
    html[data-theme="dark"] .lang-toggle {
      background: var(--surface-card);
      border-color: var(--border);
    }
    html[data-theme="dark"] .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    html[data-theme="dark"] select,
    html[data-theme="dark"] textarea {
      background: var(--surface);
      color: var(--text-dark);
      border-color: var(--border);
    }
    html[data-theme="dark"] select:focus,
    html[data-theme="dark"] textarea:focus {
      background: var(--surface-card);
    }
    html[data-theme="dark"] .center-modal {
      background: var(--surface);
      color: var(--text-dark);
    }
    html[data-theme="dark"] .modal-close {
      border-color: var(--border);
      color: var(--text-light);
    }
    html[data-theme="dark"] .modal-close:hover {
      color: var(--text-dark);
      background: var(--surface-card);
    }
  </style>
</head>
<body>

<script>
  // Init theme immediately to prevent flashing
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>

<!-- ═══════════════ MAIN ═══════════════ -->
<div id="main">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar__left">
      <button id="sidebar-toggle-btn" onclick="window.toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="1.8" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <h1 class="topbar__title" id="topbar-title" data-i18n="noticeboard">Notice Board</h1>
    </div>
    <div class="topbar__right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="lang-ta" onclick="setLang('ta')">தமிழ்</button>
      </div>

      <button id="theme-toggle-btn" onclick="window.toggleTheme()" style="width:34px;height:34px;border-radius:9999px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-med);transition:all .2s;flex-shrink:0;" title="Toggle Dark/Light Mode">
        <svg id="theme-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="theme-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ─── NOTICE BOARD SECTION ─── -->
  <div id="section-noticeboard" class="section-page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
      <div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;" data-i18n="noticeboard">Notice Board</h2>
        <p style="font-size:.8rem;color:var(--text-light);margin-top:.2rem;" data-i18n="noticeboardSubtitle">Task reminders and staff notes</p>
      </div>
      <button class="btn-add" onclick="openAddNoticeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span data-i18n="addTask">Add Task</span>
      </button>
    </div>
    <!-- Chalkboard -->
    <div id="notice-board" style="background:linear-gradient(145deg,#1a3a6e,#0e2352);border-radius:20px;min-height:500px;padding:2rem;box-shadow:0 20px 60px rgba(10,30,80,.35);position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(255,255,255,.04) 30px);border-radius:20px;pointer-events:none;"></div>
      <div style="position:absolute;left:2.5rem;top:0;bottom:0;width:2px;background:rgba(255,150,150,.15);pointer-events:none;"></div>
      <div id="notice-tasks-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem;position:relative;z-index:1;">
        <div style="text-align:center;padding:3rem;color:rgba(255,255,255,.4);grid-column:1/-1;">Loading tasks…</div>
      </div>
      <!-- Trash Can -->
      <div id="notice-dustbin" ondragover="event.preventDefault(); highlightDustbin(true);" ondragleave="highlightDustbin(false);" ondrop="handleDustbinDrop(event)" style="position:absolute;bottom:1.5rem;right:1.5rem;width:90px;height:90px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:rgba(255,255,255,0.6);transition:all 0.3s ease;cursor:pointer;">
        <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.3s;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5 11v-5m4 5v-5"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        <span style="font-size:0.55rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;" data-i18n="dragHere">Drag Here</span>
      </div>
    </div>
  </div>
</div>

<!-- ── ADD NOTICE TASK MODAL ── -->
<div class="center-modal-overlay" id="notice-modal">
  <div class="center-modal" style="width:min(460px,95vw);">
    <div class="center-modal__header">
      <span class="center-modal__title" data-i18n="addTask">Add Task / Notice</span>
      <button class="modal-close" onclick="document.getElementById('notice-modal').classList.remove('show')"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="center-modal__body">
      <div class="f-group">
        <label class="f-label"><span data-i18n="taskReminder">Task / Reminder</span> <span style="color:var(--error);">*</span></label>
        <textarea class="f-textarea" id="notice-text" style="height:80px;padding:.625rem .75rem;resize:vertical;"></textarea>
      </div>
      <div class="f-group">
        <label class="f-label" data-i18n="priority">Priority</label>
        <select class="f-select" id="notice-priority" style="padding-right:2rem;">
          <option value="normal" data-i18n="normal">Normal</option>
          <option value="urgent" data-i18n="urgent">Urgent</option>
        </select>
      </div>
    </div>
    <div class="center-modal__footer">
      <button class="btn-cancel" onclick="document.getElementById('notice-modal').classList.remove('show')">Cancel</button>
      <button class="btn-save" onclick="saveNoticeTask()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span data-i18n="addTask">Add Task</span>
      </button>
    </div>
  </div>
</div>

<!-- ── UNDO BANNER ── -->
<div class="undo-banner" id="undo-banner">
  <span id="undo-banner-text">Task deleted.</span>
  <button class="undo-btn" id="undo-btn-action" onclick="triggerUndoDelete()">Undo (<span id="undo-countdown">5</span>s)</button>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <svg id="toast-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"></svg>
  <span id="toast-msg"></span>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdNlPMX-YL7DzJZmPYOWQiMmYdSlkSGLs",
  authDomain: "gopalorthocare-e97cf.firebaseapp.com",
  projectId: "gopalorthocare-e97cf",
  storageBucket: "gopalorthocare-e97cf.firebasestorage.app",
  messagingSenderId: "263458525081",
  appId: "1:263458525081:web:78c763dac387f9ab4bcd08",
  measurementId: "G-3EHZ3EQFHL"
};
const app    = initializeApp(firebaseConfig);
const authFB = getAuth(app);
const db     = getFirestore(app);

// Auth Check + Session Timeout
const ADMIN_EMAILS = ['gopalorthocare@gmail.com'];
const SESSION_MS = 24 * 60 * 60 * 1000;
let _activityTimer = null;
const resetActivityTimer = () => {
  if (_activityTimer) clearTimeout(_activityTimer);
  localStorage.setItem('lastActivity', Date.now());
  _activityTimer = setTimeout(async () => { await signOut(authFB); window.location.href='login.html?reason=timeout'; }, SESSION_MS);
};
document.addEventListener('mousemove', resetActivityTimer, { passive: true });
document.addEventListener('keydown', resetActivityTimer, { passive: true });
document.addEventListener('click', resetActivityTimer, { passive: true });

onAuthStateChanged(authFB, async user => {
  if (!user) { window.location.href='login.html'; return; }
  if (!ADMIN_EMAILS.includes((user.email||'').toLowerCase())) { await signOut(authFB); window.location.href='login.html?reason=denied'; return; }
  const last = parseInt(localStorage.getItem('lastActivity')||'0');
  if (last && Date.now()-last > SESSION_MS) { await signOut(authFB); window.location.href='login.html?reason=timeout'; return; }
  resetActivityTimer();
  const displayName = user.displayName || (user.email||'DR').split('@')[0];
  const savedName = localStorage.getItem('displayName') || displayName;
  const av = document.getElementById('user-avatar');
  const nd = document.getElementById('user-name-display');
  if (av) av.textContent = savedName.slice(0,2).toUpperCase();
  if (nd) nd.textContent = savedName;
});

// State & Configs
const NOTICE_COLORS = [
  '#FFF176', // yellow
  '#FFCC80', // orange
  '#FFAB91', // deep orange / coral
  '#EF9A9A', // red-pink
  '#F48FB1', // pink
  '#A5D6A7', // green
  '#C5E1A5', // light green / lime
];
let draggedTaskId = null;
let undoTaskId = null;
let undoTimerId = null;

// i18n Dictionary
const i18n = {
  en: {
    patients: 'Patient Records', rooms: 'Room Management', bills: 'Billing',
    normal: 'Normal', urgent: 'Urgent', signOut: 'Sign Out',
    noticeboard: 'Notice Board', noticeboardSubtitle: 'Task reminders and staff notes',
    addTask: 'Add Task', taskReminder: 'Task / Reminder', priority: 'Priority',
    settings: 'Settings',
    dragHere: 'Drag Here'
  },
  ta: {
    patients: 'நோயாளர் பதிவுகள்', rooms: 'அறை மேலாண்மை', bills: 'கட்டண மசோதா',
    normal: 'சாதாரண', urgent: 'அவசரம்', signOut: 'வெளியேறு',
    noticeboard: 'அறிவிப்பு பலகை', noticeboardSubtitle: 'பணி நினைவூட்டல்கள் மற்றும் ஊழியர் குறிப்புகள்',
    addTask: 'பணி சேர்க்க', taskReminder: 'பணி / நினைவூட்டல்', priority: 'முன்னுரிமை',
    settings: 'அமைப்புகள்',
    dragHere: 'இங்கு இழுக்கவும்'
  }
};

let currentLang = localStorage.getItem('lang') || 'en';
window.setLang = lang => {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.setAttribute('data-lang', lang);
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-ta').classList.toggle('active', lang === 'ta');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  const sn = document.getElementById('notice-text');
  if (sn) sn.placeholder = lang === 'ta' ? 'எ.கா. அறை 4 இல் நோயாளியை மாலை 6 மணிக்கு சோதிக்கவும்' : 'e.g. Check patient at Room 4 at 6 PM';
};

// Theme manager
window.toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcons();
};

const updateThemeIcons = () => {
  const theme = document.documentElement.getAttribute('data-theme') || 'light';
  const sun = document.getElementById('theme-sun');
  const moon = document.getElementById('theme-moon');
  if(sun && moon) {
    sun.style.display = theme === 'dark' ? 'block' : 'none';
    moon.style.display = theme === 'dark' ? 'none' : 'block';
  }
};

// Sidebar Toggle
window.toggleSidebar = () => {
  if (window.innerWidth > 960) {
    document.body.classList.toggle('sidebar-collapsed');
  } else {
    document.getElementById('sidebar').classList.toggle('open');
  }
};

// Toast utility
window.showToast = (msg, type = 'success') => {
  const toast = document.getElementById('toast');
  const icon = document.getElementById('toast-icon');
  const msgEl = document.getElementById('toast-msg');
  if (!toast) return;
  toast.className = `toast show ${type}`;
  msgEl.textContent = msg;
  if (type === 'success') {
    icon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  }
  setTimeout(() => { toast.classList.remove('show'); }, 3500);
};

const esc = str => String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const fmtTs=ts=>{if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true});};

// NOTICE BOARD CONTROLS
window.openAddNoticeModal = () => {
  document.getElementById('notice-text').value = '';
  document.getElementById('notice-priority').value = 'normal';
  document.getElementById('notice-modal').classList.add('show');
};

window.handleNoticeDragStart = (e, taskId) => {
  draggedTaskId = taskId;
  e.dataTransfer.setData('text/plain', taskId);
  const card = document.getElementById(`notice-task-${taskId}`);
  if(card) {
    card.style.opacity = '0.4';
  }
};

window.handleNoticeDragEnd = () => {
  if(draggedTaskId) {
    const card = document.getElementById(`notice-task-${draggedTaskId}`);
    if(card) {
      card.style.opacity = '1';
    }
    draggedTaskId = null;
  }
};

window.highlightDustbin = (hovered) => {
  const dustbin = document.getElementById('notice-dustbin');
  if(dustbin) {
    dustbin.classList.toggle('hovered', hovered);
  }
};

window.handleDustbinDrop = (e) => {
  e.preventDefault();
  highlightDustbin(false);
  const taskId = e.dataTransfer.getData('text/plain') || draggedTaskId;
  if(!taskId) return;
  const cardContainer = document.getElementById(`notice-task-${taskId}`);
  if(!cardContainer) return;
  const rect = cardContainer.getBoundingClientRect();
  tearNoteAnimation(taskId, rect);
};

const tearNoteAnimation = (taskId, rect) => {
  const cardContainer = document.getElementById(`notice-task-${taskId}`);
  if (!cardContainer) return;
  cardContainer.style.visibility = 'hidden';
  
  const tearOverlay = document.createElement('div');
  tearOverlay.style.position = 'fixed';
  tearOverlay.style.left = rect.left + 'px';
  tearOverlay.style.top = rect.top + 'px';
  tearOverlay.style.width = rect.width + 'px';
  tearOverlay.style.height = rect.height + 'px';
  tearOverlay.style.zIndex = '99999';
  tearOverlay.style.pointerEvents = 'none';
  
  const cardInner = cardContainer.querySelector('.task-card-inner');
  const bg = cardInner ? cardInner.style.backgroundColor : '#FFF176';
  const text = cardInner ? cardInner.querySelector('p').innerHTML : '';
  const urgentBadge = cardInner ? cardInner.querySelector('.urgent-badge-html')?.innerHTML || '' : '';
  
  const clipLeft = 'polygon(0 0, 50% 0, 46% 10%, 53% 20%, 47% 30%, 54% 40%, 46% 50%, 53% 60%, 47% 70%, 54% 80%, 46% 90%, 50% 100%, 0 100%)';
  const clipRight = 'polygon(50% 0, 100% 0, 100% 100%, 50% 100%, 46% 90%, 53% 80%, 47% 70%, 54% 60%, 46% 50%, 53% 40%, 47% 30%, 54% 20%, 46% 10%, 50% 0)';
  
  const contentHtml = `
    <div style="background:${bg}; border-radius:0px; aspect-ratio:1; padding:.75rem; box-shadow:4px 6px 20px rgba(0,0,0,0.25); height: 100%; box-sizing: border-box; display:flex; flex-direction:column; justify-content:space-between;">
      ${urgentBadge ? '<div style="font-size:.55rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#c62828;margin-bottom:.25rem;">🚨 URGENT</div>' : ''}
      <p style="font-size:.75rem;color:#1a1a1a;line-height:1.35;font-family:'DM Sans',sans-serif;white-space:pre-wrap;margin:0;">${text}</p>
    </div>
  `;
  
  const leftHalf = document.createElement('div');
  leftHalf.style.position = 'absolute';
  leftHalf.style.left = '0'; leftHalf.style.top = '0'; leftHalf.style.width = '100%'; leftHalf.style.height = '100%';
  leftHalf.style.clipPath = clipLeft; leftHalf.innerHTML = contentHtml; leftHalf.className = 'tearing-left';
  
  const rightHalf = document.createElement('div');
  rightHalf.style.position = 'absolute';
  rightHalf.style.left = '0'; rightHalf.style.top = '0'; rightHalf.style.width = '100%'; rightHalf.style.height = '100%';
  rightHalf.style.clipPath = clipRight; rightHalf.innerHTML = contentHtml; rightHalf.className = 'tearing-right';
  
  tearOverlay.appendChild(leftHalf);
  tearOverlay.appendChild(rightHalf);
  document.body.appendChild(tearOverlay);
  
  setTimeout(() => {
    if(tearOverlay && tearOverlay.parentElement) {
      document.body.removeChild(tearOverlay);
    }
  }, 850);
  
  triggerDeleteFlow(taskId);
};

const triggerDeleteFlow = (taskId) => {
  if(undoTaskId && undoTaskId !== taskId) {
    executePendingDelete();
  }
  
  undoTaskId = taskId;
  const banner = document.getElementById('undo-banner');
  const countSpan = document.getElementById('undo-countdown');
  const textSpan = document.getElementById('undo-banner-text');
  
  if(banner && countSpan) {
    textSpan.textContent = currentLang === 'ta' ? 'பணி நீக்கப்பட்டது.' : 'Task teared/deleted.';
    banner.classList.add('show');
    let timeLeft = 5;
    countSpan.textContent = timeLeft;
    
    clearInterval(undoTimerId);
    undoTimerId = setInterval(() => {
      timeLeft--;
      countSpan.textContent = timeLeft;
      if(timeLeft <= 0) {
        clearInterval(undoTimerId);
        executePendingDelete();
      }
    }, 1000);
  }
};

const executePendingDelete = async () => {
  const banner = document.getElementById('undo-banner');
  if(banner) banner.classList.remove('show');
  
  if(undoTaskId) {
    const id = undoTaskId;
    undoTaskId = null;
    try {
      await deleteDoc(doc(db, 'noticeTasks', id));
    } catch(err) {
      console.error(err);
    }
  }
};

window.triggerUndoDelete = () => {
  clearInterval(undoTimerId);
  const banner = document.getElementById('undo-banner');
  if(banner) banner.classList.remove('show');
  
  if(undoTaskId) {
    const cardContainer = document.getElementById(`notice-task-${undoTaskId}`);
    if (cardContainer) {
      cardContainer.style.visibility = 'visible';
      cardContainer.style.opacity = '1';
    }
    undoTaskId = null;
    showToast(currentLang === 'ta' ? 'மீட்டெடுக்கப்பட்டது!' : 'Restored!');
    renderNoticeTasks();
  }
};

window.saveNoticeTask = async () => {
  const text = document.getElementById('notice-text').value.trim();
  if (!text) { showToast('Enter task text.', 'error'); return; }
  const randomColor = NOTICE_COLORS[Math.floor(Math.random() * NOTICE_COLORS.length)];
  const priority = document.getElementById('notice-priority').value;
  try {
    await addDoc(collection(db, 'noticeTasks'), {
      text,
      color: randomColor,
      priority,
      done: false,
      createdAt: serverTimestamp()
    });
    document.getElementById('notice-modal').classList.remove('show');
    showToast('Task added to board.');
  } catch(err) { showToast('Error: ' + err.message, 'error'); }
};

// Listen and render tasks
let allTasks = [];
onSnapshot(query(collection(db,'noticeTasks'),orderBy('createdAt','desc')),snap=>{
  allTasks=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderNoticeTasks();
});

const renderNoticeTasks = () => {
  const grid = document.getElementById('notice-tasks-grid');
  if (!grid) return;
  if (!allTasks.length) {
    grid.innerHTML = '<div style="text-align:center;padding:4rem;color:rgba(255,255,255,.35);grid-column:1/-1;"><div style="font-size:2.5rem;margin-bottom:1rem;">📋</div><div style="font-size:1rem;font-family:\'Cormorant Garamond\',serif;">Board is empty</div><div style="font-size:.8rem;margin-top:.5rem;">Click \'Add Task\' to pin a note</div></div>';
    return;
  }
  grid.innerHTML = allTasks.map(task => {
    const urgentBadge = task.priority === 'urgent' ? '<div class="urgent-badge-html" style="font-size:.55rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#c62828;margin-bottom:.25rem;">🚨 URGENT</div>' : '';
    const pinStyle = `width:16px;height:16px;background:#c62828;border-radius:50%;margin:0 auto -8px;position:relative;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.3);`;
    const visibility = (task.id === undoTaskId) ? 'hidden' : 'visible';
    return `
      <div id="notice-task-${task.id}" draggable="true" ondragstart="handleNoticeDragStart(event, '${task.id}')" ondragend="handleNoticeDragEnd(event)" class="draggable-task" style="position:relative; visibility:${visibility};">
        <div style="${pinStyle}"></div>
        <div class="task-card-inner" style="background:${task.color||'#FFF176'};border-radius:0px;aspect-ratio:1;padding:.75rem;box-shadow:4px 6px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.4);position:relative;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;transform:rotate(${(Math.random()*4-2).toFixed(1)}deg);transition:transform .2s;" onmouseenter="this.style.transform='rotate(0deg) scale(1.03)'" onmouseleave="this.style.transform='rotate(${(Math.random()*4-2).toFixed(1)}deg)'">
          <div class="urgent-badge-html" style="display:none;">${urgentBadge}</div>
          <div>
            ${urgentBadge}
            <p style="font-size:.75rem;color:#1a1a1a;line-height:1.35;font-family:'DM Sans',sans-serif;white-space:pre-wrap;word-break:break-word;margin:0;max-height:85px;overflow-y:auto;scrollbar-width:none;">${esc(task.text)}</p>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;">
            <span style="font-size:.6rem;color:rgba(0,0,0,.4);">${task.createdAt ? fmtTs(task.createdAt) : ''}</span>
            <div style="display:flex;gap:.25rem;">
              ${task.done ? '<button onclick="toggleNotice(\''+task.id+'\',false)" style="width:22px;height:22px;border:none;background:rgba(0,0,0,0.15);border-radius:4px;cursor:pointer;font-size:.7rem;" title="Mark incomplete">↩</button>' : '<button onclick="toggleNotice(\''+task.id+'\',true)" style="width:22px;height:22px;border:none;background:rgba(45,122,79,.2);border-radius:4px;cursor:pointer;font-size:.7rem;" title="Mark done">✓</button>'}
            </div>
          </div>
          ${task.done ? '<div style="position:absolute;inset:0;background:rgba(255,255,255,.5);border-radius:0px;display:flex;align-items:center;justify-content:center;"><div style="font-size:1.25rem;color:#2d7a4f;">✓</div></div>' : ''}
        </div>
      </div>`;
  }).join('');
};

window.toggleNotice = async (id, done) => {
  await updateDoc(doc(db,'noticeTasks',id), {done});
  showToast(done ? 'Task marked as done!' : 'Task reopened.');
};

// Initial Language & theme load
window.setLang(currentLang);
updateThemeIcons();

</script>
</body>
</html>
