<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing & Invoices – Gopal Ortho Care</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --primary:#0A6EBD;--primary-dark:#064A80;--primary-darker:#062A45;
      --primary-ul:#E6F1FE;--gold:#C8973A;--gold-light:#E8C776;
      --bg:#F0F7FF;--bg-dark:#062A45;--bg-darker:#041C30;
      --surface:#ffffff;--surface-card:#F8FBFF;
      --border:#D6E6F5;--border-med:#B0CCE8;
      --text-dark:#1A1A1A;--text-med:#4A4A4A;--text-light:#8A8A8A;
      --success:#2D7A4F;--success-bg:#EDF7F2;
      --error:#B94040;--error-bg:#FEF2F2;--warning:#D97706;
      --sidebar-w:260px;
    }
    html{font-size:16px;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex;overflow-x:hidden;}
    [data-lang="ta"] body,[data-lang="ta"] input,[data-lang="ta"] select,[data-lang="ta"] textarea,[data-lang="ta"] button{font-family:'Noto Sans Tamil','DM Sans',sans-serif;}

    /* ── SIDEBAR ── */
    #sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--bg-darker);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1);}
    body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
    body.sidebar-collapsed #main { margin-left: 0; }
    @media (max-width: 960px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0 !important; }
      body.sidebar-collapsed #sidebar { transform: translateX(0); }
    }

    #sidebar-toggle-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      transition: all 0.2s;
    }
    #sidebar-toggle-btn:hover {
      border-color: var(--primary);
      background: var(--primary-ul);
      color: var(--primary);
    }
    .sidebar__brand{padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid rgba(255,255,255,.06);}
    .sidebar__logo{display:flex;align-items:center;gap:.625rem;text-decoration:none;}
    .sidebar__logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(10,110,189,.35);}
    .sidebar__logo-text .gopal{display:block;font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:#fff;line-height:1;}
    .sidebar__logo-text .ortho{display:block;font-size:.6rem;color:rgba(255,255,255,.4);letter-spacing:.18em;text-transform:uppercase;}
    .sidebar__badge{margin:.5rem 1.25rem;padding:.2rem .625rem;background:rgba(200,151,58,.15);border:1px solid rgba(200,151,58,.3);border-radius:5px;font-size:.625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light);display:inline-block;}
    .sidebar__nav{flex:1;padding:.875rem .75rem;display:flex;flex-direction:column;gap:.2rem;}
    .nav-item{display:flex;align-items:center;gap:.625rem;padding:.65rem .875rem;border-radius:9px;font-size:.875rem;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid transparent;background:none;width:100%;text-align:left;}
    .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
    .nav-item.active{background:rgba(10,110,189,.2);color:#fff;border-color:rgba(10,110,189,.35);}
    .nav-item svg{width:16px;height:16px;stroke:rgba(255,255,255,.4);fill:none;flex-shrink:0;transition:stroke .2s;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.7;}
    .nav-item.active svg{stroke:#5EB1F0;}
    .nav-item:hover svg{stroke:rgba(255,255,255,.8);}
    .nav-divider{height:1px;background:rgba(255,255,255,.06);margin:.375rem 0;}
    .sidebar__footer{padding:.875rem .75rem 1rem;border-top:1px solid rgba(255,255,255,.06);}
    .user-pill{display:flex;align-items:center;gap:.5rem;padding:.625rem;background:rgba(255,255,255,.05);border-radius:9999px;margin-bottom:.625rem;}
    .user-pill__avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;}
    .user-pill__name{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.75);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-logout{width:100%;height:36px;background:rgba(185,64,64,.12);border:1px solid rgba(185,64,64,.25);border-radius:7px;color:rgba(255,100,100,.85);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;}
    .btn-logout:hover{background:rgba(185,64,64,.22);color:#ff8080;}

    /* ── MAIN ── */
    #main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .3s cubic-bezier(.4,0,.2,1);}

    /* ── TOPBAR ── */
    .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;gap:1rem;}
    .topbar__left{display:flex;align-items:center;gap:.75rem;}
    .topbar__title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--text-dark);}
    .topbar__right{display:flex;align-items:center;gap:.75rem;}

    /* Language toggle */
    .lang-toggle{display:flex;align-items:center;background:var(--surface-card);border:1.5px solid var(--border);border-radius:9999px;padding:3px;gap:2px;}
    .lang-btn{height:28px;padding:0 .75rem;border-radius:9999px;border:none;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-light);letter-spacing:.02em;}
    .lang-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(10,110,189,.3);}

    /* Add button */
    .btn-add{height:38px;padding:0 1.1rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .25s;box-shadow:0 4px 14px rgba(10,110,189,.3);white-space:nowrap;}
    .btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,110,189,.4);}

    /* ── SECTION PAGES ── */
    .section-page{flex:1;padding:1.5rem;}

    /* ── BILLS ── */
    .bills-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem;}
    .bills-grid{display:grid;gap:.875rem;}
    .bill-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;display:flex;align-items:center;gap:1rem;transition:all .2s;}
    .bill-card:hover{box-shadow:0 4px 20px rgba(10,110,189,.1);border-color:var(--border-med);}
    .bill-card__icon{width:42px;height:42px;background:var(--primary-ul);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .bill-card__icon svg{width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:1.7;stroke-linecap:round;}
    .bill-card__info{flex:1;min-width:0;}
    .bill-card__name{font-weight:600;font-size:.9rem;margin-bottom:.1rem;}
    .bill-card__meta{font-size:.75rem;color:var(--text-light);}
    .bill-card__amount{font-family:'DM Mono',monospace;font-size:1rem;font-weight:600;color:var(--text-dark);}
    .bill-paid{color:var(--success);}
    .bill-unpaid{color:var(--warning);}

    /* ── FORM ELEMENTS ── */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:.875rem;}
    .f-group{display:flex;flex-direction:column;gap:.3rem;}
    .f-label{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-med);}
    .f-label span{color:var(--error);}
    .f-input,.f-select{height:40px;padding:0 .75rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.875rem;color:var(--text-dark);background:var(--surface-card);outline:none;transition:all .2s;width:100%;}
    .f-input:focus,.f-select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(10,110,189,.1);}
    .f-select{cursor:pointer;padding-right:2rem;}
    .filter-btn{height:34px;padding:0 .875rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);font-family:inherit;font-size:.775rem;font-weight:500;color:var(--text-med);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.3rem;}
    .filter-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ul);}
    .preset-chip{height:30px;padding:0 .6rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface-card);font-family:inherit;font-size:.72rem;font-weight:500;color:var(--text-med);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .preset-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ul);}
    .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text-light);}
    .icon-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ul);}
    .icon-btn.delete:hover{border-color:var(--error);color:var(--error);background:var(--error-bg);}
    .icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;}

    /* Buttons */
    .btn-cancel{height:38px;padding:0 1.1rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:inherit;font-size:.875rem;font-weight:500;color:var(--text-med);cursor:pointer;transition:all .2s;}
    .btn-cancel:hover{border-color:var(--text-med);color:var(--text-dark);}
    .btn-save{height:38px;padding:0 1.375rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .25s;box-shadow:0 4px 14px rgba(10,110,189,.3);}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,110,189,.4);}

    /* Pagination */
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.1rem;border-top:1px solid var(--border);gap:1rem;}
    .pagination__info{font-size:.775rem;color:var(--text-light);}
    .pagination__btns{display:flex;gap:.3rem;}
    .page-btn{height:30px;min-width:30px;padding:0 .5rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);font-family:inherit;font-size:.775rem;color:var(--text-med);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .page-btn:hover,.page-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-ul);}
    .page-btn:disabled{opacity:.4;cursor:not-allowed;}

    /* Search */
    .search-box{position:relative;}
    .search-box svg{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text-light);fill:none;stroke-width:1.7;stroke-linecap:round;pointer-events:none;}
    #search-input{height:42px;padding:0 1.1rem 0 2.4rem;border:1.5px solid var(--border);border-radius:9999px;font-family:inherit;font-size:.875rem;color:var(--text-dark);background:var(--surface);outline:none;width:260px;transition:all .25s;}
    #search-input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(10,110,189,.1);width:320px;}
    html[data-theme="dark"] #search-input{background:var(--surface);color:var(--text-dark);border-color:var(--border);}
    html[data-theme="dark"] #search-input:focus{background:var(--surface-card);border-color:var(--primary);}
    html[data-theme="dark"] #search-input::placeholder{color:var(--text-light);}

    /* Filter Popover */
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;gap:1rem;flex-wrap:wrap;}
    .popover-wrap{position:relative;display:inline-block;}
    .popover-content{display:none;position:absolute;top:calc(100% + .5rem);left:0;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;box-shadow:0 12px 30px rgba(4,28,48,.18);padding:1rem;z-index:999;width:280px;}
    .popover-content.show{display:block;}
    html[data-theme="dark"] .popover-content { background: var(--surface); border-color: var(--border); }

    /* ── MODALS ── */
    .center-modal-overlay{position:fixed;inset:0;background:rgba(4,28,48,.65);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1.5rem;}
    .center-modal-overlay.show{display:flex;}
    .center-modal{background:var(--surface);border-radius:16px;width:min(440px,95vw);max-height:90vh;overflow:hidden;box-shadow:0 24px 60px rgba(4,28,48,.3);display:flex;flex-direction:column;}
    .center-modal__header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .center-modal__title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;}
    .center-modal__body{padding:1.5rem;display:flex;flex-direction:column;gap:.875rem;overflow-y:auto;flex:1;overscroll-behavior:contain;}
    .center-modal__footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end;flex-shrink:0;}
    .modal-close{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:all .2s;}
    .modal-close:hover{border-color:var(--error);color:var(--error);}
    .modal-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:2;}

    /* ── BILL PRINT VIEW ── */
    .bill-print-overlay{position:fixed;inset:0;background:rgba(4,28,48,.7);backdrop-filter:blur(8px);z-index:1100;display:none;align-items:center;justify-content:center;padding:1.5rem;}
    .bill-print-overlay.show{display:flex;}
    .bill-print-modal{background:#fff;border-radius:12px;width:min(520px,95vw);max-height:92vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.4);color:#333 !important;}
    .bill-print-actions{padding:1rem 1.5rem;border-bottom:1px solid #eee;display:flex;gap:.75rem;align-items:center;justify-content:space-between;}
    #bill-template{padding:2rem 2rem 1.5rem;font-family:'DM Sans',sans-serif;background:#fff !important;color:#333 !important;}
    #bill-template *{color:#333;}
    #bill-template .bill-hospital-name, #bill-template .bill-divider, #bill-template .bill-doctor-row, #bill-template .bill-table th, #bill-template .bill-total-row td { color: #1a237e !important; }
    #bill-template tbody tr:hover{background:transparent !important;}
    .bill-hospital-name{font-size:1.6rem;font-weight:800;color:#1a237e !important;letter-spacing:.04em;text-transform:uppercase;text-align:center;line-height:1.1;}
    .bill-reg{font-size:.75rem;color:#555;text-align:center;margin-bottom:.25rem;}
    .bill-address{font-size:.8rem;color:#333;text-align:center;line-height:1.5;margin-bottom:.25rem;}
    .bill-mob{font-size:.8rem;color:#333;text-align:center;}
    .bill-divider{border:none;border-top:1.5px solid #1a237e;margin:.875rem 0;}
    .bill-doctors{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.625rem;}
    .bill-doctor-row{display:flex;justify-content:space-between;font-size:.775rem;color:#1a237e;}
    .bill-doctor-name{font-weight:600;}
    .bill-doctor-reg{font-size:.7rem;color:#555;}
    .bill-date-row{display:flex;justify-content:flex-end;font-size:.8rem;margin-bottom:.875rem;}
    .bill-patient-row{display:flex;gap:1rem;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #ddd;}
    .bill-patient-field{font-size:.8rem;}.bill-patient-field span{font-weight:600;}
    .bill-table{width:100%;border-collapse:collapse;margin-bottom:.875rem;}
    .bill-table th{background:#e8eaf6;color:#1a237e;font-size:.75rem;font-weight:700;padding:.5rem .625rem;text-align:left;border:1px solid #c5cae9;}
    .bill-table td{font-size:.8rem;padding:.5rem .625rem;border:1px solid #ddd;}
    .bill-table td:last-child,.bill-table th:last-child{text-align:right;}
    .bill-total-row td{font-weight:700;background:#f3f4f9;color:#1a237e;font-size:.875rem;}
    .bill-sign{margin-top:1.5rem;display:flex;justify-content:flex-end;font-size:.8rem;color:#333;}
    .bill-footer-note{font-size:.7rem;color:#888;text-align:center;margin-top:.875rem;border-top:1px solid #eee;padding-top:.5rem;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;background:var(--bg-darker);color:#fff;padding:.75rem 1.1rem;border-radius:11px;font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 32px rgba(4,28,48,.35);transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{border-left:4px solid #2D7A4F;}
    .toast.error{border-left:4px solid var(--error);}
    .toast svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0;}

    /* ── DARK MODE OVERRIDES ── */
    html[data-theme="dark"] {
      --bg: #07121e;
      --bg-dark: #091a2b;
      --bg-darker: #040d16;
      --surface: #0e1e30;
      --surface-card: #13273c;
      --border: #1e3753;
      --border-med: #2b4e75;
      --text-dark: #f0f6fc;
      --text-med: #c9d1d9;
      --text-light: #8b949e;
      --success: #3fb950;
      --success-bg: rgba(63,185,80,0.1);
      --error: #f85149;
      --error-bg: rgba(248,81,73,0.1);
      --warning: #f0883e;
      --primary-ul: rgba(10,110,189,0.25);
    }
    html[data-theme="dark"] body {
      color: var(--text-dark);
      background: var(--bg);
    }
    html[data-theme="dark"] .lang-btn:not(.active) {
      color: var(--text-light);
    }
    html[data-theme="dark"] .lang-toggle {
      background: var(--surface-card);
      border-color: var(--border);
    }
    html[data-theme="dark"] .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    html[data-theme="dark"] .icon-btn {
      background: var(--surface);
    }
    html[data-theme="dark"] .icon-btn:hover {
      background: var(--primary-ul);
    }
    html[data-theme="dark"] .icon-btn.delete:hover {
      background: var(--error-bg);
    }
    html[data-theme="dark"] select,
    html[data-theme="dark"] input {
      background: var(--surface);
      color: var(--text-dark);
      border-color: var(--border);
    }
    html[data-theme="dark"] select:focus,
    html[data-theme="dark"] input:focus {
      background: var(--surface-card);
    }
    html[data-theme="dark"] .bill-card {
      background: var(--surface);
      border-color: var(--border);
    }
    html[data-theme="dark"] .center-modal {
      background: var(--surface);
      color: var(--text-dark);
    }
    html[data-theme="dark"] .modal-close {
      border-color: var(--border);
      color: var(--text-light);
    }
    html[data-theme="dark"] .modal-close:hover {
      color: var(--text-dark);
      background: var(--surface-card);
    }

    /* PRINT */
    @media print{
      body *{visibility:hidden !important;}
      #bill-template,#bill-template *{visibility:visible !important;}
      #bill-template{position:fixed;inset:0;padding:2cm;background:#fff;}
    }
  </style>
</head>
<body>

<script>
  // Init theme immediately to prevent flashing
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside id="sidebar">
  <div class="sidebar__brand">

let currentLang = localStorage.getItem('lang') || 'en';
window.setLang = lang => {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.setAttribute('data-lang', lang);
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-ta').classList.toggle('active', lang === 'ta');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  const bps = document.getElementById('bill-patient-search');
  if (bps) bps.placeholder = lang === 'ta' ? 'பெயர் அல்லது ஐடி மூலம் தேடவும்…' : 'Search by name or ID…';
};

// Theme Manager
window.toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcons();
};

const updateThemeIcons = () => {
  const theme = document.documentElement.getAttribute('data-theme') || 'light';
  const sun = document.getElementById('theme-sun');
  const moon = document.getElementById('theme-moon');
  if(sun && moon) {
    sun.style.display = theme === 'dark' ? 'block' : 'none';
    moon.style.display = theme === 'dark' ? 'none' : 'block';
  }
};

// Sidebar collapse
window.toggleSidebar = () => {
  if (window.innerWidth > 960) {
    document.body.classList.toggle('sidebar-collapsed');
  } else {
    document.getElementById('sidebar').classList.toggle('open');
  }
};

// Toast utility
window.showToast = (msg, type = 'success') => {
  const toast = document.getElementById('toast');
  const icon = document.getElementById('toast-icon');
  const msgEl = document.getElementById('toast-msg');
  if (!toast) return;
  toast.className = `toast show ${type}`;
  msgEl.textContent = msg;
  if (type === 'success') {
    icon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  }
  setTimeout(() => { toast.classList.remove('show'); }, 3500);
};

const esc = str => String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const fmtDate = dStr => { if(!dStr)return'—'; const d=new Date(dStr); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); };
const fmtTs=ts=>{if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true});};

// Listeners
onSnapshot(query(collection(db,'patients'),orderBy('createdAt','desc')),snap=>{
  allPatients=snap.docs.map(d=>({id:d.id,...d.data()}));
});
onSnapshot(query(collection(db,'rooms'),orderBy('createdAt','asc')),snap=>{
  allRooms=snap.docs.map(d=>({id:d.id,...d.data()}));
});
onSnapshot(query(collection(db,'bills'),orderBy('createdAt','desc'),limit(500)),snap=>{
  allBills=snap.docs.map(d=>({id:d.id,...d.data()}));
  applyFilters();
});

// Search and Filter Logic
window.toggleFilterPopover = (e) => {
  if (e) e.stopPropagation();
  const pop = document.getElementById('filter-popover');
  pop.classList.toggle('show');
};

document.addEventListener('click', (e) => {
  const pop = document.getElementById('filter-popover');
  const trig = document.getElementById('filter-popover-trigger');
  if (pop && trig && !pop.contains(e.target) && !trig.contains(e.target)) {
    pop.classList.remove('show');
  }
});

window.handleSearch = (val) => {
  searchQ = val;
  billsCurrentPage = 1;
  applyFilters();
};

window.applyFilters = () => {
  let list = [...allBills];
  
  // Search
  if (searchQ.trim()) {
    const q = searchQ.toLowerCase().trim();
    list = list.filter(b => 
      (b.patientName||'').toLowerCase().includes(q) ||
      (b.id||'').toLowerCase().includes(q)
    );
  }
  
  // Payment Filter
  const popPay = document.getElementById('pop-payment')?.value || 'all';
  if (popPay === 'paid') list = list.filter(b => b.paid === true);
  if (popPay === 'unpaid') list = list.filter(b => b.paid !== true);
  
  // Date Range Filter
  const popDateRange = document.getElementById('pop-date-range')?.value || 'all';
  if (popDateRange !== 'all') {
    const todayStr = new Date().toISOString().slice(0, 10);
    const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const sevenDaysAgo = new Date(Date.now() - 7 * 86400000);
    const startOfMonthStr = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0, 10);
    
    list = list.filter(b => {
      const d = b.date || '';
      if (!d) return false;
      if (popDateRange === 'today') return d === todayStr;
      if (popDateRange === 'yesterday') return d === yesterdayStr;
      if (popDateRange === 'week') return new Date(d) >= sevenDaysAgo;
      if (popDateRange === 'month') return d >= startOfMonthStr;
      return true;
    });
  }
  
  // Doctor Filter
  const gopalCh = document.getElementById('pop-doc-gopal')?.checked;
  const shinyCh = document.getElementById('pop-doc-shiny')?.checked;
  list = list.filter(b => {
    if (b.doctor === 'Dr. N. Gopala Krishnan') return gopalCh;
    if (b.doctor === 'Dr. R. Shiny') return shinyCh;
    return true;
  });
  
  filteredBills = list;
  billsCurrentPage = 1;
  renderBills();
};

// Bill listing pagination
const renderBills = () => {
  const grid = document.getElementById('bills-grid');
  const pag = document.getElementById('bills-pagination');
  if(!filteredBills.length){
    grid.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-light);">No bills found.</div>';
    if(pag) pag.style.display='none';
    return;
  }
  const total=filteredBills.length;
  const start=(billsCurrentPage-1)*billsPerPage;
  const slice=filteredBills.slice(start,start+billsPerPage);
  
  grid.innerHTML=slice.map(b=>`
    <div class="bill-card">
      <div class="bill-card__icon"><svg viewBox="0 0 24 24" stroke-width="1.7" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/></svg></div>
      <div class="bill-card__info">
        <div class="bill-card__name">${esc(b.patientName||'—')}</div>
        <div class="bill-card__meta">${esc(b.doctor||'—')} · ${fmtDate(b.date)} · Bill #${b.id.slice(0,6).toUpperCase()}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.375rem;">
        <div class="bill-card__amount">₹${b.total||0}</div>
        <div style="display:flex;gap:.5rem;align-items:center;">
          ${b.paid ? `
            <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;font-weight:700;color:var(--success);background:var(--success-bg);padding:.25rem .625rem;border-radius:9999px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              <span data-i18n="paid">Paid</span>
            </span>
          ` : `
            <button class="filter-btn" onclick="togglePaid('${b.id}', true)" style="height:28px;padding:0 .5rem;font-size:.7rem;border-radius:6px;gap:.2rem;border-color:var(--warning);color:var(--warning);background:rgba(219,119,6,.06);" onmouseenter="this.style.background='rgba(219,119,6,.12)'" onmouseleave="this.style.background='rgba(219,119,6,.06)'">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              Mark Paid
            </button>
          `}
          <button class="icon-btn" onclick="printBill('${b.id}')" title="Print bill"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
          <button class="icon-btn delete" onclick="deleteBill('${b.id}')" title="Delete bill"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
        </div>
      </div>
    </div>`).join('');
    
  const pages=Math.ceil(total/billsPerPage);
  if(pag){
    if(pages>1){
      pag.style.display='flex';
      document.getElementById('bills-page-info').textContent=`${start+1}–${Math.min(start+billsPerPage,total)} of ${total}`;
      document.getElementById('bills-page-btns').innerHTML=
        `<button class="page-btn" onclick="goBillsPage(${billsCurrentPage-1})" ${billsCurrentPage===1?'disabled':''}>←</button>`+
        Array.from({length:pages},(_,i)=>`<button class="page-btn${billsCurrentPage===i+1?' active':''}" onclick="goBillsPage(${i+1})">${i+1}</button>`).join('')+
        `<button class="page-btn" onclick="goBillsPage(${billsCurrentPage+1})" ${billsCurrentPage===pages?'disabled':''}>→</button>`;
    }else{pag.style.display='none';}
  }
};
window.goBillsPage=n=>{billsCurrentPage=n;renderBills();};

// Search Patients
window.filterBillPatients = (q) => {
  const dropdown = document.getElementById('bill-patient-dropdown');
  const hiddenInput = document.getElementById('bill-patient');
  if (!q || q.length < 1) { dropdown.style.display='none'; hiddenInput.value=''; return; }
  const matches = allPatients.filter(p =>
    (p.name||'').toLowerCase().includes(q.toLowerCase()) ||
    (p.patientCode||'').toLowerCase().includes(q.toLowerCase()) ||
    (p.phone||'').includes(q)
  ).slice(0, 10);
  if (!matches.length) { dropdown.style.display='none'; return; }
  dropdown.style.display = 'block';
  dropdown.innerHTML = matches.map(p => `
    <div onclick="selectBillPatient('${p.id}','${esc(p.name)}','${esc(p.doctor||'')}', ${p.hasInsurance === true})" style="padding:.625rem 1rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .15s;" onmouseenter="this.style.background='var(--primary-ul)'" onmouseleave="this.style.background='transparent'">
      <div style="font-weight:600;">${esc(p.name)} <span style="font-family:monospace;font-size:.7rem;color:var(--primary);">${p.patientCode||''}</span></div>
      <div style="font-size:.75rem;color:var(--text-light);">${p.age||'?'}y · ${p.gender||''} · ${esc(p.phone||'')}</div>
    </div>`).join('');
};

window.selectBillPatient = (id, name, doctor, hasIns) => {
  document.getElementById('bill-patient').value = id;
  document.getElementById('bill-patient-search').value = name;
  document.getElementById('bill-patient-dropdown').style.display = 'none';
  if(doctor) document.getElementById('bill-doctor').value = doctor;
  
  // Auto-fill room rent calculation if they are checked in
  const roomForPatient = allRooms.find(r => r.patientId === id && r.occupied);
  if (roomForPatient && roomForPatient.checkInTime) {
    const ms = Date.now() - (roomForPatient.checkInTime.toDate ? roomForPatient.checkInTime.toDate() : new Date(roomForPatient.checkInTime)).getTime();
    const nights = Math.max(1, Math.ceil(ms / 86400000));
    const roomRate = roomForPatient.hasInsurance ? billingDefaults.roomRateIns : billingDefaults.roomRateNoIns;
    const roomTotal = nights * roomRate;
    const existingIdx = window.billItemsData.findIndex(it => it.desc && it.desc.toLowerCase().includes('room'));
    if (existingIdx >= 0) {
      window.billItemsData[existingIdx] = { desc: `Room Rent – ${roomForPatient.name} (${nights} night${nights>1?'s':''})`, amount: roomTotal };
    } else {
      window.billItemsData.push({ desc: `Room Rent – ${roomForPatient.name} (${nights} night${nights>1?'s':''})`, amount: roomTotal });
    }
    renderBillItems(); calcBillTotal();
  }
};

// Close dropdown on outside click
document.addEventListener('click', e => {
  const dd = document.getElementById('bill-patient-dropdown');
  const inp = document.getElementById('bill-patient-search');
  if (dd && inp && !dd.contains(e.target) && e.target !== inp) dd.style.display = 'none';
});

// Bill generator items list
window.billItemsData = [];
window.renderBillItems = () => {
  const list = document.getElementById('bill-items-list');
  if(!list) return;
  list.innerHTML = window.billItemsData.map((it, i) => `
    <div style="display:flex;gap:.5rem;align-items:center;">
      <input class="f-input" style="flex:1;" placeholder="Description" value="${esc(it.desc)}" oninput="window.billItemsData[${i}].desc=this.value;calcBillTotal()">
      <input class="f-input" style="width:90px;" type="number" placeholder="0" value="${it.amount}" oninput="window.billItemsData[${i}].amount=Number(this.value)||0;calcBillTotal()">
      <button onclick="window.billItemsData.splice(${i},1);renderBillItems();calcBillTotal()" style="width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;color:var(--error);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;">x</button>
    </div>`).join('');
};

window.addBillItem = () => {
  window.billItemsData.push({ desc: '', amount: 0 });
  renderBillItems();
  calcBillTotal();
};

window.calcBillTotal = () => {
  const tot = window.billItemsData.reduce((a, b) => a + (b.amount || 0), 0);
  document.getElementById('bill-total-display').textContent = '₹' + tot;
};

window.addPresetBillItem = (desc) => {
  let amount = 0;
  if(desc === 'Dressing Fee') amount = billingDefaults.dressingFee || 100;
  else if(desc === 'X-Ray Fee') amount = billingDefaults.xrayFee || 200;
  else if(desc === 'Nursing Fee') amount = billingDefaults.nursingFee || 150;
  else if(desc === 'Dr. Visiting Charge') amount = billingDefaults.drVisitCharge || 200;
  else if(desc === 'Surgeon Fee') amount = billingDefaults.surgeonFee || 500;
  else if(desc === 'Implant Fee') amount = billingDefaults.implantFee || 0;
  else if(desc === 'Anaesthetist Fee') amount = billingDefaults.anaesthetistFee || 300;
  else if(desc === 'Procedure Charge') amount = billingDefaults.procedureCharge || 0;
  window.billItemsData.push({ desc, amount });
  renderBillItems();
  calcBillTotal();
};

// Room rent – custom modal (no browser prompt/confirm)
let _roomRentResolve = null;
window.addRoomRentPreset = () => {
  const pid = document.getElementById('bill-patient').value;
  const p = allPatients.find(x => x.id === pid);
  let defaultNights = 1;
  let defaultIns = p ? p.hasInsurance === true : false;

  const roomForPatient = allRooms.find(r => r.patientId === pid && r.occupied);
  if (roomForPatient && roomForPatient.checkInTime) {
    const ms = Date.now() - (roomForPatient.checkInTime.toDate ? roomForPatient.checkInTime.toDate() : new Date(roomForPatient.checkInTime)).getTime();
    defaultNights = Math.max(1, Math.ceil(ms / 86400000));
    defaultIns = roomForPatient.hasInsurance === true;
  }

  // Populate and show the custom room-rent dialog
  document.getElementById('rr-nights').value = defaultNights;
  document.getElementById('rr-ins').value = defaultIns ? 'yes' : 'no';
  const rateIns = billingDefaults.roomRateIns;
  const rateNoIns = billingDefaults.roomRateNoIns;
  document.getElementById('rr-rate-preview').textContent =
    `Insurance rate ₹${rateIns}/night · Regular ₹${rateNoIns}/night`;
  document.getElementById('room-rent-modal').classList.add('show');
  window._rrRoom = roomForPatient;
};

window.confirmRoomRent = () => {
  const nights = parseInt(document.getElementById('rr-nights').value) || 1;
  const ins = document.getElementById('rr-ins').value === 'yes';
  const rate = ins ? billingDefaults.roomRateIns : billingDefaults.roomRateNoIns;
  const total = nights * rate;
  const rr = window._rrRoom;
  const desc = `Room Rent – ${rr ? rr.name : 'Room'} (${nights} night${nights > 1 ? 's' : ''})`;
  window.billItemsData.push({ desc, amount: total });
  renderBillItems();
  calcBillTotal();
  document.getElementById('room-rent-modal').classList.remove('show');
};

window.openBillGenerator = () => {
  const consultFee = billingDefaults.consultFee || 250;
  window.billItemsData = [
    { desc: 'Consulting Fee', amount: consultFee }
  ];
  renderBillItems();
  calcBillTotal();
  document.getElementById('bill-date').value = new Date().toISOString().slice(0, 10);
  const bps = document.getElementById('bill-patient-search');
  const bph = document.getElementById('bill-patient');
  if(bps) bps.value = '';
  if(bph) bph.value = '';
  document.getElementById('bill-gen-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
};

window.saveBillAndPrint = async () => {
  const pid = document.getElementById('bill-patient').value;
  if(!pid){showToast('Search and select a patient.','error');return;}
  const searchText = document.getElementById('bill-patient-search').value;
  const p = allPatients.find(x => x.id === pid);
  const doctor = document.getElementById('bill-doctor').value;
  const date = document.getElementById('bill-date').value;
  const total = window.billItemsData.reduce((a, b) => a + (b.amount || 0), 0);
  const billData = {
    patientId: pid,
    patientName: p?.name || searchText,
    doctor,
    date,
    items: [...window.billItemsData],
    total,
    paid: false,
    createdAt: serverTimestamp()
  };
  try {
    const ref = await addDoc(collection(db, 'bills'), billData);
    document.getElementById('bill-gen-modal').classList.remove('show');
    document.body.style.overflow = '';
    showToast('Bill saved.');
    renderBillTemplate({ id: ref.id, ...billData }, p);
    document.getElementById('bill-print-overlay').classList.add('show');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
};

window.printBill = async (id) => {
  const b = allBills.find(x => x.id === id);
  if(!b) return;
  const p = allPatients.find(x => x.id === b.patientId);
  renderBillTemplate(b, p);
  document.getElementById('bill-print-overlay').classList.add('show');
};

window.togglePaid = async (id, paid) => {
  await updateDoc(doc(db, 'bills', id), { paid });
  showToast(paid ? 'Marked as paid.' : 'Marked as unpaid.');
};

window.deleteBill = async (id) => {
  if(!confirm('Delete this bill?')) return;
  await deleteDoc(doc(db, 'bills', id));
  showToast('Bill deleted.');
};

// Init Language load
window.setLang(currentLang);
updateThemeIcons();

// Parse patientId from URL parameters on load
const urlParams = new URLSearchParams(window.location.search);
const preselectedPatientId = urlParams.get('patientId');
if (preselectedPatientId) {
  setTimeout(() => {
    const p = allPatients.find(x => x.id === preselectedPatientId);
    if (p) {
      window.openBillGenerator();
      window.selectBillPatient(p.id, p.name, p.doctor || '', p.hasInsurance === true);
    }
  }, 600);
}
