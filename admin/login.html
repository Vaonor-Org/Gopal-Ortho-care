<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Gopal Ortho Care</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #0A6EBD;
      --primary-dark:  #064A80;
      --primary-darker:#062A45;
      --gold:          #C8973A;
      --gold-light:    #E8C776;
      --bg-dark:       #062A45;
      --bg-darker:     #041C30;
      --border:        #D6E6F5;
      --error:         #B94040;
      --text-dark:     #1A1A1A;
      --text-med:      #4A4A4A;
      --text-light:    #8A8A8A;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-darker);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(10,110,189,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(200,151,58,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    /* Hospital branding */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand__logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .brand__icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(10,110,189,0.35);
    }

    .brand__name {
      text-align: left;
    }

    .brand__gopal {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      letter-spacing: 0.01em;
    }

    .brand__ortho {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand__subtitle {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
    }

    /* Card */
    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 40px 80px rgba(4,28,48,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    }

    .card__eyebrow {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .card__eyebrow::before {
      content: '';
      width: 20px;
      height: 1.5px;
      background: var(--gold);
      flex-shrink: 0;
    }

    .card__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-med);
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-light);
      fill: none;
      transition: stroke 0.2s;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      height: 48px;
      padding: 0 1rem 0 2.5rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      color: var(--text-dark);
      background: #F8FBFF;
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(10,110,189,0.12);
    }

    .form-input:focus + .input-icon,
    .input-wrap:focus-within .input-icon {
      stroke: var(--primary);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--text-light);
      display: flex;
      align-items: center;
    }

    .pw-toggle:hover { color: var(--primary); }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(185,64,64,0.08);
      border: 1px solid rgba(185,64,64,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--error);
      margin-bottom: 1.25rem;
    }

    .error-msg.show { display: flex; }

    /* Submit button */
    .btn-login {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(10,110,189,0.35);
      margin-top: 1.5rem;
      letter-spacing: 0.01em;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(10,110,189,0.45);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 1;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: rgba(10,110,189,0.15);
      top: -80px; left: -80px;
      animation: float1 8s ease-in-out infinite;
    }

    .orb-2 {
      width: 200px; height: 200px;
      background: rgba(200,151,58,0.12);
      bottom: -60px; right: -60px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(30px, 20px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(-20px, -30px); }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="brand">
      <div class="brand__logo">
        <div class="brand__icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
            <path d="M9 12h6M12 9v6" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand__name">
          <span class="brand__gopal">GOPAL</span>
          <span class="brand__ortho">Ortho Care</span>
        </div>
      </div>
      <p class="brand__subtitle">Admin Portal</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <p class="card__eyebrow">Secure Access</p>
      <h1 class="card__title">Welcome back,<br><em style="font-style:italic;color:#0A6EBD;">Doctor.</em></h1>

      <!-- Error -->
      <div class="error-msg" id="error-msg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span id="error-text">Invalid email or password.</span>
      </div>

      <!-- Form -->
      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="doctor@gopalortho.com"
              autocomplete="email"
              required
            >
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="3"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <div class="spinner"></div>
          <span class="btn-text">Sign In to Dashboard</span>
        </button>
      </form>
    </div>

    <p class="login-footer">Gopal Ortho Care Hospital &bull; Admin Portal &bull; Authorized access only</p>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6u7Bm1qosC7IDx5Qk7mD-QlRTDV3o1RA",
      authDomain: "gopal-fd3d8.firebaseapp.com",
      projectId: "gopal-fd3d8",
      storageBucket: "gopal-fd3d8.firebasestorage.app",
      messagingSenderId: "114488164961",
      appId: "1:114488164961:web:ad3a60422ff71545032020"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Redirect if already logged in
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // Password toggle
    const pwToggle = document.getElementById('pw-toggle');
    const pwInput  = document.getElementById('password');
    const eyeIcon  = document.getElementById('eye-icon');

    pwToggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type   = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    // Login form
    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('login-btn');
    const errMsg  = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');

    function showError(msg) {
      errText.textContent = msg;
      errMsg.classList.add('show');
    }

    function hideError() { errMsg.classList.remove('show'); }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('Please enter your email and password.'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Login failed. Please try again.';
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          msg = 'Invalid email or password.';
        } else if (err.code === 'auth/too-many-requests') {
          msg = 'Too many attempts. Please try again later.';
        } else if (err.code === 'auth/network-request-failed') {
          msg = 'Network error. Check your connection.';
        }
        showError(msg);
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
