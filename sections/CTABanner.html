<!-- ============================================================
     F013 — CTA Banner Section
     Diagonal CSS clip-path split: green (60%) / gold (40%)
     ============================================================ -->

<section class="cta-banner" id="cta-banner" aria-labelledby="cta-banner-headline">

  <!-- Bone grid pattern on dark side -->
  <div class="cta-banner__pattern" aria-hidden="true">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="boneGridCTA" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M16 20h8M20 16v8" stroke="white" stroke-width="1.5"
                stroke-linecap="round" opacity="0.05"/>
          <circle cx="16" cy="20" r="2" fill="white" opacity="0.04"/>
          <circle cx="24" cy="20" r="2" fill="white" opacity="0.04"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#boneGridCTA)"/>
    </svg>
  </div>

  <!-- Large decorative medical cross -->
  <div class="cta-banner__cross" aria-hidden="true">
    <svg viewBox="0 0 160 160" fill="none" width="320" height="320">
      <rect x="60" y="0"  width="40" height="160" rx="8" fill="white" opacity="0.04"/>
      <rect x="0"  y="60" width="160" height="40" rx="8" fill="white" opacity="0.04"/>
    </svg>
  </div>

  <div class="container">
    <div class="cta-banner__content reveal">

      <div class="cta-banner__text">
        <p class="cta-banner__eyebrow">Take the First Step</p>
        <h2 class="cta-banner__headline" id="cta-banner-headline">
          Don't Let Pain<br>Hold You Back
        </h2>
        <p class="cta-banner__sub">
          Expert care is just one appointment away. Our specialists are ready to
          help you reclaim your movement and your life.
        </p>
      </div>

      <div class="cta-banner__actions">
        <a href="/contact" class="cta-banner__btn-primary" id="cta-book-btn"
           aria-label="Contact our team">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.75"/>
            <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
          Contact Our Team
        </a>
        <a href="tel:+919597040918" class="cta-banner__btn-outline" id="cta-call-btn"
           aria-label="Call Gopal Ortho">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"
                  stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Call: 095970 40918
        </a>
      </div>

    </div>
  </div>
</section>

<style>
.cta-banner {
  position: relative;
  background: #0B3D2E;
  padding: clamp(4rem, 8vw, 7rem) 0;
  overflow: hidden;
}

/* Diagonal split: right 40% becomes gold */
.cta-banner::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 45%;
  background: #C8973A;
  clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
  z-index: 0;
}

.cta-banner__pattern {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  width: 60%;
}

.cta-banner__cross {
  position: absolute;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
  pointer-events: none;
  opacity: 0.6;
}

.cta-banner .container {
  position: relative;
  z-index: 3;
}

.cta-banner__content {
  max-width: 680px;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

.cta-banner__eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.55);
  margin-bottom: 0.25rem;
}

.cta-banner__headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.25rem, 5vw, 4rem);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.03em;
  color: white;
}

.cta-banner__sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  color: rgba(255, 255, 255, 0.65);
  line-height: 1.7;
  max-width: 520px;
}

.cta-banner__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: center;
}

.cta-banner__btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  height: 52px;
  padding: 0 1.75rem;
  border-radius: 9999px;
  background: white;
  color: #0B3D2E;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9375rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.cta-banner__btn-primary:hover {
  background: #C8973A;
  color: white;
  box-shadow: 0 8px 32px rgba(200, 151, 58, 0.4);
  transform: translateY(-1px);
}

.cta-banner__btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  height: 52px;
  padding: 0 1.75rem;
  border-radius: 9999px;
  border: 1.5px solid rgba(255, 255, 255, 0.5);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9375rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.cta-banner__btn-outline:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: white;
}

@media (max-width: 768px) {
  .cta-banner::after { display: none; }
  .cta-banner__cross { display: none; }
  .cta-banner__actions { flex-direction: column; align-items: flex-start; }
  .cta-banner__btn-primary,
  .cta-banner__btn-outline { width: 100%; justify-content: center; }
}
</style>

<script>
(function() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('revealed'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.cta-banner .reveal').forEach(function(el) { obs.observe(el); });
})();
</script>
