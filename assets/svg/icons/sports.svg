<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Running figure -->
  <!-- Head -->
  <circle cx="28" cy="6" r="3.5" stroke="#0B3D2E" stroke-width="1.5"/>
  <!-- Torso (leaning forward) -->
  <path d="M27 10 L22 20" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left arm swinging back -->
  <path d="M24 14 L16 18 L13 22" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right arm forward -->
  <path d="M24 14 L30 10 L34 11" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left thigh back -->
  <path d="M22 20 L16 28" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left shin + foot -->
  <path d="M16 28 L18 35 L14 36" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right thigh forward -->
  <path d="M22 20 L26 28" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right shin + foot with knee highlight -->
  <path d="M26 28 L24 35 L28 36" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Knee highlight circle -->
  <circle cx="25" cy="28" r="3" stroke="#C8973A" stroke-width="1.5" fill="none"/>
</svg>
