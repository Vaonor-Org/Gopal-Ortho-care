<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 5 vertebrae stack -->
  <rect x="12" y="3"  width="16" height="5" rx="2" stroke="#0B3D2E" stroke-width="1.5"/>
  <rect x="12" y="11" width="16" height="5" rx="2" stroke="#0B3D2E" stroke-width="1.5"/>
  <rect x="12" y="19" width="16" height="5" rx="2" stroke="#0B3D2E" stroke-width="1.5"/>
  <rect x="12" y="27" width="16" height="5" rx="2" stroke="#0B3D2E" stroke-width="1.5"/>
  <rect x="12" y="35" width="16" height="4" rx="2" stroke="#0B3D2E" stroke-width="1.5"/>
  <!-- Disc spaces (small gaps indicated by dashes) -->
  <line x1="14" y1="9"  x2="26" y2="9"  stroke="#0B3D2E" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="14" y1="17" x2="26" y2="17" stroke="#0B3D2E" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="14" y1="25" x2="26" y2="25" stroke="#0B3D2E" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="14" y1="33" x2="26" y2="33" stroke="#0B3D2E" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.5"/>
  <!-- Spinal canal centre line -->
  <line x1="20" y1="3" x2="20" y2="39" stroke="#0B3D2E" stroke-width="0.5" opacity="0.25"/>
</svg>
