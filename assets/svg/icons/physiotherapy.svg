<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Parallel bars (two horizontal bars) -->
  <line x1="4" y1="18" x2="36" y2="18" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="28" x2="36" y2="28" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bar supports -->
  <line x1="6"  y1="18" x2="6"  y2="35" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="18" x2="34" y2="35" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Figure between bars -->
  <!-- Head -->
  <circle cx="20" cy="8" r="3.5" stroke="#0B3D2E" stroke-width="1.5"/>
  <!-- Torso -->
  <line x1="20" y1="12" x2="20" y2="22" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arms holding bars -->
  <path d="M11 18 L15 16 L20 18" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M29 18 L25 16 L20 18" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Legs stepping -->
  <path d="M20 22 L17 28 L14 32" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 22 L23 28 L26 32" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
