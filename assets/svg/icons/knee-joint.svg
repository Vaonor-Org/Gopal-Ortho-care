<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Femur (thigh bone) -->
  <path d="M18 4 Q15 8 16 14 Q17 18 20 20" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tibia (shin bone) -->
  <path d="M20 20 Q23 22 24 26 Q25 32 23 36" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Patella (kneecap) -->
