  <!-- Meniscus (cartilage disc) -->
  <path d="M15 24 Q20 26 25 24" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fibula -->
  <path d="M26 22 Q28 28 27 36" stroke="#0B3D2E" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Joint space lines -->
