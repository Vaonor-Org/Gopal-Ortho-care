<!-- ============================================================
     F004 — Hero Anatomy Figure SVG
     Running human figure in medical scan aesthetic
     ViewBox: 0 0 600 700 | anatomyFloat 7s | ringWave rings
     ============================================================ -->
<svg class="anatomy-figure" viewBox="0 0 600 700" fill="none"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Medical anatomy figure with highlighted knee joint"
     id="anatomy-figure">

  <defs>
    <!-- Body gradient: translucent deep medical blue -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%" fx="50%" fy="35%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0B3D6E" stop-opacity="0.85"/>
    </radialGradient>

    <!-- Knee radial gradient: orange-red highlight -->
    <radialGradient id="kneeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E53E3E" stop-opacity="0.9"/>
    </radialGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8973A" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#C8973A" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#C8973A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C8973A" stop-opacity="0"/>
    </linearGradient>

    <!-- Bone shimmer filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Knee glow filter -->
    <filter id="kneeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ========================================================
       LAYER 1: 8 Concentric Rings from Knee (cx=300 cy=480)
       ringWave animation with 0.5s stagger between each ring
       ======================================================== -->
  <g class="ring-group" aria-hidden="true">
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.8" fill="none" opacity="0.6"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 0s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.7" fill="none" opacity="0.5"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 0.5s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.6" fill="none" opacity="0.45"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 1s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.5" fill="none" opacity="0.4"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 1.5s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.5" fill="none" opacity="0.35"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 2s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.4" fill="none" opacity="0.3"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 2.5s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.4" fill="none" opacity="0.25"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 3s;"/>
    <circle cx="300" cy="480" r="30"  stroke="#94A3B8" stroke-width="0.3" fill="none" opacity="0.2"
            style="animation: ringWave 3s ease-out infinite; animation-delay: 3.5s;"/>
  </g>

  <!-- ========================================================
       LAYER 2: Human Body Silhouette (translucent medical blue)
       Running upright figure, front-facing stance
       ======================================================== -->

  <!-- Head -->
  <ellipse cx="300" cy="95" rx="38" ry="44" fill="url(#bodyGrad)"/>

  <!-- Neck -->
  <path d="M286 135 Q300 148 314 135 L316 162 Q300 172 284 162 Z" fill="url(#bodyGrad)"/>

  <!-- Torso (shoulders to hips) -->
  <path d="
    M220 168 Q200 175 192 200 L185 290 Q184 310 190 325
    L210 340 Q255 358 300 360 Q345 358 390 340
    L410 325 Q416 310 415 290 L408 200 Q400 175 380 168
    Q340 155 300 153 Q260 155 220 168 Z
  " fill="url(#bodyGrad)"/>

  <!-- Left Arm (upper) -->
  <path d="M192 195 Q165 220 155 265 Q148 295 158 325 Q168 315 178 310 Q182 275 192 245 Z"
        fill="url(#bodyGrad)"/>
  <!-- Left Forearm -->
  <path d="M158 325 Q150 360 148 400 Q155 410 168 407 Q174 365 180 328 Z"
        fill="url(#bodyGrad)"/>
  <!-- Left Hand -->
  <ellipse cx="155" cy="415" rx="14" ry="20" fill="url(#bodyGrad)"/>

  <!-- Right Arm (upper) -->
  <path d="M408 195 Q435 220 445 265 Q452 295 442 325 Q432 315 422 310 Q418 275 408 245 Z"
        fill="url(#bodyGrad)"/>
  <!-- Right Forearm -->
  <path d="M442 325 Q450 360 452 400 Q445 410 432 407 Q426 365 420 328 Z"
        fill="url(#bodyGrad)"/>
  <!-- Right Hand -->
  <ellipse cx="445" cy="415" rx="14" ry="20" fill="url(#bodyGrad)"/>

  <!-- Pelvis / Hip region -->
  <path d="
    M210 340 Q200 355 205 375 Q215 395 240 405
    Q270 415 300 416 Q330 415 360 405
    Q385 395 395 375 Q400 355 390 340
    Q345 358 300 360 Q255 358 210 340 Z
  " fill="url(#bodyGrad)"/>

  <!-- Left Thigh -->
  <path d="M240 405 Q225 440 218 480 Q214 510 218 540
           Q228 545 242 542 Q245 510 248 478 Q254 444 265 415 Z"
        fill="url(#bodyGrad)"/>
  <!-- Left Knee area (wider) -->
  <rect x="215" y="538" width="36" height="20" rx="4" fill="url(#bodyGrad)"/>
  <!-- Left Shin -->
  <path d="M218 558 Q212 595 213 635 Q215 655 224 660
           Q234 658 238 655 Q236 615 237 578 Q238 562 242 558 Z"
        fill="url(#bodyGrad)"/>
  <!-- Left Foot -->
  <ellipse cx="222" cy="668" rx="18" ry="10" fill="url(#bodyGrad)" transform="rotate(-8 222 668)"/>

  <!-- Right Thigh -->
  <path d="M360 405 Q375 440 382 480 Q386 510 382 540
           Q372 545 358 542 Q355 510 352 478 Q346 444 335 415 Z"
        fill="url(#bodyGrad)"/>
  <!-- Right Knee area -->
  <rect x="349" y="538" width="36" height="20" rx="4" fill="url(#bodyGrad)"/>
  <!-- Right Shin -->
  <path d="M382 558 Q388 595 387 635 Q385 655 376 660
           Q366 658 362 655 Q364 615 363 578 Q362 562 358 558 Z"
        fill="url(#bodyGrad)"/>
  <!-- Right Foot -->
  <ellipse cx="378" cy="668" rx="18" ry="10" fill="url(#bodyGrad)" transform="rotate(8 378 668)"/>

  <!-- ========================================================
       LAYER 3: Skeleton Bone Lines (femur, tibia, fibula, patella etc.)
       Light medical blue stroke lines inside body
       ======================================================== -->
  <g class="bone-lines" filter="url(#glow)" aria-hidden="true"
     style="animation: skeletonShimmer 4s ease-in-out infinite;">

    <!-- Spine -->
    <line x1="300" y1="162" x2="300" y2="350" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="6 5"/>

    <!-- Clavicles -->
    <path d="M300 168 Q260 172 228 188" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    <path d="M300 168 Q340 172 372 188" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>

    <!-- Rib cage outline -->
    <path d="M260 195 Q240 215 242 245 Q260 258 300 260 Q340 258 358 245 Q360 215 340 195"
          stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M265 215 Q248 235 252 258 Q270 270 300 272 Q330 270 348 258 Q352 235 335 215"
          stroke="#93C5FD" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Sternum -->
    <line x1="300" y1="195" x2="300" y2="295" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>

    <!-- Pelvis arc -->
    <path d="M230 355 Q265 375 300 378 Q335 375 370 355" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M240 362 Q268 385 300 388 Q332 385 360 362" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- Left Femur -->
    <line x1="260" y1="395" x2="233" y2="540" stroke="#93C5FD" stroke-width="3" stroke-linecap="round"/>
    <!-- Left Tibia -->
    <line x1="228" y1="558" x2="220" y2="655" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left Fibula -->
    <line x1="240" y1="558" x2="235" y2="650" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Right Femur -->
    <line x1="340" y1="395" x2="367" y2="540" stroke="#93C5FD" stroke-width="3" stroke-linecap="round"/>
    <!-- Right Tibia -->
    <line x1="372" y1="558" x2="380" y2="655" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right Fibula -->
    <line x1="360" y1="558" x2="365" y2="650" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Left Humerus -->
    <line x1="202" y1="202" x2="162" y2="325" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    <!-- Left Radius/Ulna -->
    <line x1="162" y1="328" x2="155" y2="408" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="170" y1="330" x2="163" y2="406" stroke="#93C5FD" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- Right Humerus -->
    <line x1="398" y1="202" x2="438" y2="325" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    <!-- Right Radius/Ulna -->
    <line x1="438" y1="328" x2="445" y2="408" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="430" y1="330" x2="437" y2="406" stroke="#93C5FD" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- Left Patella -->
    <circle cx="233" cy="549" r="6" stroke="#93C5FD" stroke-width="1.5" fill="none"/>
    <!-- Right Patella -->
    <circle cx="367" cy="549" r="6" stroke="#93C5FD" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ========================================================
       LAYER 4: Knee Joint Highlight (cx=300 cy=480)
       Orange-red radial gradient + kneePulse glow
       NOTE: For hero the "central focus" knee is between both legs
       ======================================================== -->
  <g class="knee-focus" aria-hidden="true" filter="url(#kneeGlow)"
     style="animation: kneePulse 2.5s ease-in-out infinite; will-change: opacity;">
    <circle cx="300" cy="480" r="28" fill="url(#kneeGrad)"/>
    <!-- Joint line detail -->
    <line x1="283" y1="475" x2="317" y2="475" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="283" y1="483" x2="317" y2="483" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/>
    <!-- Ball socket hint -->
    <circle cx="300" cy="479" r="8" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>

  <!-- ========================================================
       LAYER 5: Scan Pulse Line across the knee
       ======================================================== -->
  <line class="scan-pulse-line" x1="220" y1="480" x2="380" y2="480"
        stroke="url(#scanGrad)" stroke-width="1.5" opacity="0.6"
        aria-hidden="true"
        style="animation: kneePulse 2.5s ease-in-out infinite; animation-delay: 0.5s;"/>

</svg>

<style>
.anatomy-figure {
  width: 100%;
  max-width: 520px;
  height: auto;
  display: block;
}

@media (prefers-reduced-motion: no-preference) {
  .anatomy-figure {
    animation: anatomyFloat 7s ease-in-out infinite;
    will-change: transform;
  }

  .ring-group circle {
    will-change: transform, opacity;
  }

  .bone-lines {
    will-change: opacity;
  }

  .knee-focus {
    will-change: opacity;
  }
}

/* Wrap all keyframe usages for reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .anatomy-figure,
  .ring-group circle,
  .bone-lines,
  .knee-focus,
  .scan-pulse-line {
    animation: none !important;
  }
}

@media (max-width: 1024px) {
  .anatomy-figure {
    width: 90vw;
    max-width: 400px;
    margin: 0 auto;
  }
}
</style>
